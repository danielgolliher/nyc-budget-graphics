const MENU_OPTS = ['1. About this district','2. Landmarks & neighborhoods','3. Current issues','4. Bills & legislation','5. Email this office','6. Goodbye'];
const VISIBLE_BILLS = 4;

function getLegBills() {
    if (dlg.legTab === 0) return (LEGIS[dlg.id]||[]);
    return (COLEGIS[dlg.id]||[]).map(n => coBill(n));
}

function startDialogue(id) {
    const m = MEMBERS[id]; if(!m) return;
    state='dialogue';
    dlg={active:true,id,phase:'greeting',text:m.greeting,chars:0,ct:0,mi:0,legTab:0,legCursor:0,legScroll:0,socCursor:0,socScroll:0,
         emCc:'',emSubject:'',emBody:'',emField:0};
    visitedMembers.add(id);
}

function startFerryDialogue(idx) {
    state='dialogue';
    dlg={active:true,id:'ferry',phase:'ferrymenu',ferryIdx:idx,mi:0,text:'',chars:0,ct:0};
}

function startSquirrelDialogue() {
    state='dialogue';
    dlg={active:true,id:'sq',phase:'greeting',text:SQUIRREL.greeting,chars:0,ct:0,mi:0};
}

function handleDlgInput(key) {
    if(!dlg.active) return;
    if(key==='Escape'){
        if(dlg.phase==='email'||dlg.phase==='legislation'||dlg.phase==='issues') {dlg.phase='menu';return;}
        if(dlg.phase==='sqmenu'||dlg.phase==='sqresponse'||dlg.phase==='ferrymenu') {dlg.active=false;state='playing';return;}
        dlg.active=false;state='playing';return;
    }
    if(dlg.phase==='greeting'||dlg.phase==='response'||dlg.phase==='sqresponse'){
        if(key===' '||key==='Enter'){
            if(dlg.chars<dlg.text.length) dlg.chars=dlg.text.length;
            else dlg.phase=(dlg.id==='sq'?'sqmenu':'menu');
        }
        return;
    }
    if(dlg.phase==='sqmenu'){
        const topics = SQUIRREL.topics;
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(topics.length-1,dlg.mi+1);
        else if(key==='Enter'||key===' ') {
            if(dlg.mi===topics.length-1){dlg.active=false;state='playing';return;}
            if(dlg.mi===5){window.open('https://data.cityofnewyork.us/Environment/2018-Central-Park-Squirrel-Census-Squirrel-Data/vfnx-vebw','_blank');return;}
            dlg.phase='sqresponse';dlg.text=SQUIRREL.responses[dlg.mi];dlg.chars=0;dlg.ct=0;
        } else if(key>='1'&&key<='7'){
            const i=parseInt(key)-1;
            if(i===topics.length-1){dlg.active=false;state='playing';return;}
            if(i===5){window.open('https://data.cityofnewyork.us/Environment/2018-Central-Park-Squirrel-Census-Squirrel-Data/vfnx-vebw','_blank');return;}
            if(i<SQUIRREL.responses.length){dlg.phase='sqresponse';dlg.text=SQUIRREL.responses[i];dlg.chars=0;dlg.ct=0;}
        }
        return;
    }
    if(dlg.phase==='ferrymenu'){
        const dests = FERRIES.filter((_,i) => i !== dlg.ferryIdx);
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(dests.length,dlg.mi+1);
        else if(key==='Enter'||key===' '){
            if(dlg.mi>=dests.length){dlg.active=false;state='playing';return;}
            const dest=dests[dlg.mi];
            player.x=dest.pos.x*TILE+TILE/2; player.y=dest.pos.y*TILE+TILE/2;
            camera.x=player.x-W/2; camera.y=player.y-H/2;
            camera.x=Math.max(0,Math.min(MAP_W*TILE-W,camera.x));
            camera.y=Math.max(0,Math.min(MAP_H*TILE-H,camera.y));
            dlg.active=false; state='playing';
        }
        return;
    }
    if(dlg.phase==='issues'){
        const links = MEMBERS[dlg.id].social||[];
        const max = Math.max(0, links.length - 1);
        const visCount = 3;
        if(key==='ArrowUp'||key==='w'){
            dlg.socCursor=Math.max(0,dlg.socCursor-1);
            if(dlg.socCursor<dlg.socScroll) dlg.socScroll=dlg.socCursor;
        } else if(key==='ArrowDown'||key==='s'){
            dlg.socCursor=Math.min(max,dlg.socCursor+1);
            if(dlg.socCursor>dlg.socScroll+visCount-1) dlg.socScroll=dlg.socCursor-visCount+1;
        } else if(key==='Enter'){
            if(links.length>0&&links[dlg.socCursor]) window.open(links[dlg.socCursor][2],'_blank');
        } else if(key===' '){
            dlg.phase='menu';
        }
        return;
    }
    if(dlg.phase==='menu'){
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(5,dlg.mi+1);
        else if(key==='Enter'||key===' ') selectOpt(dlg.mi);
        else if(key>='1'&&key<='6') selectOpt(parseInt(key)-1);
        return;
    }
    if(dlg.phase==='legislation'){
        const bills = getLegBills();
        const max = Math.max(0, bills.length - 1);
        if(key==='ArrowUp'||key==='w') {
            dlg.legCursor = Math.max(0, dlg.legCursor - 1);
            if(dlg.legCursor < dlg.legScroll) dlg.legScroll = dlg.legCursor;
        } else if(key==='ArrowDown'||key==='s') {
            dlg.legCursor = Math.min(max, dlg.legCursor + 1);
            if(dlg.legCursor > dlg.legScroll + VISIBLE_BILLS - 1) dlg.legScroll = dlg.legCursor - VISIBLE_BILLS + 1;
        } else if(key==='Tab'||key==='ArrowLeft'||key==='ArrowRight') {
            dlg.legTab = 1 - dlg.legTab;
            dlg.legCursor = 0; dlg.legScroll = 0;
        } else if(key==='Enter') {
            if(bills.length > 0) {
                const bill = bills[dlg.legCursor];
                if(bill) window.open(legistarUrl(bill[0]), '_blank');
            }
        } else if(key===' '||key==='Escape') {
            dlg.phase='menu';
        }
        return;
    }
    if(dlg.phase==='email'){
        const fields = ['emCc','emSubject','emBody'];
        if(key==='Tab'||(key==='ArrowDown'&&dlg.emField<3)||(key==='ArrowUp'&&dlg.emField>0)){
            if(key==='Tab'||key==='ArrowDown') dlg.emField=Math.min(3,dlg.emField+1);
            else dlg.emField=Math.max(0,dlg.emField-1);
        } else if(dlg.emField===3 && (key==='Enter'||key===' ') && !dlg.emSending){
            // Send via Cloudflare Worker
            const m = MEMBERS[dlg.id];
            if(!dlg.emCc||!dlg.emCc.includes('@')){dlg.emStatus='Enter a valid email in CC';return;}
            if(!dlg.emSubject){dlg.emStatus='Enter a subject';return;}
            if(!dlg.emBody){dlg.emStatus='Enter a message';return;}
            dlg.emSending=true; dlg.emStatus='Sending...';
            fetch('https://council-game-email.danielgolliher.workers.dev',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    toEmail: m.email,
                    fromEmail: dlg.emCc,
                    memberName: m.name,
                    district: m.district,
                    subject: dlg.emSubject,
                    message: dlg.emBody
                })
            }).then(r=>r.json()).then(r=>{
                dlg.emSending=false;
                dlg.emStatus=r.success?'Sent! Check your CC inbox.':'Error: '+(r.error||'Failed');
            }).catch(e=>{
                dlg.emSending=false;
                dlg.emStatus='Network error - try again';
            });
        } else if(dlg.emField < 3){
            const f = fields[dlg.emField];
            if(key==='Backspace'){
                dlg[f]=dlg[f].slice(0,-1);
            } else if(key==='Enter' && dlg.emField===2){
                dlg.emBody+='\n';
            } else if(key.length===1){
                dlg[f]+=key;
            }
        }
        return;
    }
}

function selectOpt(i) {
    const m = MEMBERS[dlg.id];
    if(i===5){dlg.active=false;state='playing';return;}
    if(i===4){dlg.phase='email';dlg.emCc='';dlg.emSubject='';dlg.emBody='';dlg.emField=0;dlg.emSending=false;dlg.emStatus='';return;}
    if(i===3){dlg.phase='legislation';dlg.legTab=0;dlg.legCursor=0;dlg.legScroll=0;return;}
    if(i===2){dlg.phase='issues';dlg.socCursor=0;dlg.socScroll=0;return;}
    const topics=['about','landmarks'];
    dlg.phase='response'; dlg.topic=topics[i]; dlg.text=m[topics[i]]||'...'; dlg.chars=0; dlg.ct=0;
}

function wrapText(text,x,y,maxW,lineH){
    const words=text.split(' ');let line='',ty=y;
    for(const w of words){const t=line+w+' ';
        if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line.trim(),x,ty);line=w+' ';ty+=lineH;}
        else line=t;
    }
    if(line.trim()) ctx.fillText(line.trim(),x,ty);
}

// ═══════════════════════════
// PORTRAIT RENDERING
// ═══════════════════════════
function drawPortrait(id, dx, dy, size) {
    const photo = portraits[id];
    const c = DISTRICT_COLORS[id]||'#555';

    // Border
    ctx.fillStyle = c;
    ctx.fillRect(dx-3, dy-3, size+6, size+6);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(dx-3, dy-3, size+6, size+6);

    if (photo && !photo._htmlOnly) {
        try { ctx.drawImage(photo, dx, dy, size, size); }
        catch(e) { photo._htmlOnly = true; }
    }
    if (photo && photo._htmlOnly) {
        // Use HTML img overlay for cross-origin images that can't be drawn to canvas
        const rect = canvas.getBoundingClientRect();
        const sx = rect.width/W, sy = rect.height/H;
        photoOverlay.src = photo.src;
        photoOverlay.style.display = 'block';
        photoOverlay.style.left = (rect.left - canvas.parentElement.getBoundingClientRect().left + dx*sx) + 'px';
        photoOverlay.style.top = (rect.top - canvas.parentElement.getBoundingClientRect().top + dy*sy) + 'px';
        photoOverlay.style.width = (size*sx) + 'px';
        photoOverlay.style.height = (size*sy) + 'px';
        photoOverlay.style.borderColor = c;
    } else if (!photo) {
        // Placeholder
        ctx.fillStyle = '#222';
        ctx.fillRect(dx, dy, size, size);
        ctx.fillStyle = c;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        const m = MEMBERS[id];
        const initials = id === 3 ? '?' : m.name.split(' ').map(w=>w[0]).filter(c=>c&&c!=='[').join('');
        ctx.fillText(initials, dx + size/2, dy + size/2 + 5);
        ctx.textAlign = 'left';
    }
}

// ═══════════════════════════
// UPDATE
// ═══════════════════════════
function update() {
    if(state!=='playing') return;
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']){dx=-SPEED;player.dir=1;}
    if(keys['ArrowRight']||keys['d']){dx=SPEED;player.dir=2;}
    if(keys['ArrowUp']||keys['w']){dy=-SPEED;player.dir=3;}
    if(keys['ArrowDown']||keys['s']){dy=SPEED;player.dir=0;}
    player.moving=dx!==0||dy!==0;
    if(player.moving){
        if(dx&&dy){dx*=0.707;dy*=0.707;}
        const r=8;
        const canGo=(px,py)=>{const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;return map[ty][tx]>0;};
        const nx=player.x+dx;
        if(canGo(nx-r,player.y-r)&&canGo(nx+r,player.y-r)&&canGo(nx-r,player.y+r)&&canGo(nx+r,player.y+r))player.x=nx;
        const ny=player.y+dy;
        if(canGo(player.x-r,ny-r)&&canGo(player.x+r,ny-r)&&canGo(player.x-r,ny+r)&&canGo(player.x+r,ny+r))player.y=ny;
        player.ft++;if(player.ft>8){player.frame=1-player.frame;player.ft=0;}
    }else{player.frame=0;player.ft=0;}
    const tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);
    const d=(ty>=0&&ty<MAP_H&&tx>=0&&tx<MAP_W)?map[ty][tx]:0;
    if(d>0&&d<=52&&d!==currentDistrict){
        currentDistrict=d;
        if(d<=51) banner={text:`District ${d} - ${DISTRICT_NAMES[d]||''}`,timer:180};
        else if(d===52) banner={text:'Park',timer:180};
    }
    if(banner.timer>0) banner.timer--;
    // Bridge name detection
    if(d===53){
        const bname=getBridgeName(tx,ty);
        if(bname&&bname!==bridgeBanner.lastBridge){
            bridgeBanner={text:bname,timer:180,lastBridge:bname};
        }
    } else { bridgeBanner.lastBridge=''; }
    if(bridgeBanner.timer>0) bridgeBanner.timer--;
    nearNPC=null;
    // Check squirrel first, then ferries, then members
    const sqx=SQUIRREL.pos.x*TILE+TILE/2, sqy=SQUIRREL.pos.y*TILE+TILE/2;
    if(Math.hypot(player.x-sqx,player.y-sqy)<TILE*2){nearNPC='sq';}
    else {
        // Check ferry terminals
        for(let fi=0;fi<FERRIES.length;fi++){
            const f=FERRIES[fi];const fx=f.pos.x*TILE+TILE/2,fy=f.pos.y*TILE+TILE/2;
            if(Math.hypot(player.x-fx,player.y-fy)<TILE*2){nearNPC='ferry_'+fi;break;}
        }
        if(!nearNPC) for(const[id,m]of Object.entries(MEMBERS)){
            const did=parseInt(id);
            const nx=m.pos.x*TILE+TILE/2,ny=m.pos.y*TILE+TILE/2;
            if(Math.hypot(player.x-nx,player.y-ny)<TILE*2){nearNPC=did;break;}
        }
    }
    const vw=W/zoom, vh=H/zoom; // viewport size in world pixels
    camera.x+=((player.x-vw/2)-camera.x)*0.1;
    camera.y+=((player.y-vh/2)-camera.y)*0.1;
    camera.x=Math.max(0,Math.min(MAP_W*TILE-vw,camera.x));
    camera.y=Math.max(0,Math.min(MAP_H*TILE-vh,camera.y));
    if(visitedMembers.size===Object.keys(MEMBERS).length&&!completionShown){completionShown=true;completionTimer=360;}
    if(completionTimer>0) completionTimer--;
}

// ═══════════════════════════
// RENDER
// ═══════════════════════════
function render() {
    ctx.clearRect(0,0,W,H);
    if(state==='title'){renderTitle();return;}
    if(state==='instructions'){renderInstructions();return;}

    // World rendering (zoomed)
    const vw=W/zoom, vh=H/zoom;
    ctx.save();
    ctx.scale(zoom,zoom);
    ctx.translate(-camera.x,-camera.y);

    // Map (draw only visible portion for performance)
    const sx=Math.max(0,Math.floor(camera.x)),sy=Math.max(0,Math.floor(camera.y));
    const sw=Math.min(mapCvs.width-sx,Math.ceil(vw)+TILE),sh=Math.min(mapCvs.height-sy,Math.ceil(vh)+TILE);
    ctx.drawImage(mapCvs, sx, sy, sw, sh, sx, sy, sw, sh);

    // NPCs (world space - transform handles camera offset)
    for(const[id,m]of Object.entries(MEMBERS)){
        const did=parseInt(id);
        const sx=m.pos.x*TILE,sy=m.pos.y*TILE;
        const scx=sx-camera.x,scy=sy-camera.y;
        if(scx>-TILE*2/zoom&&scx<vw+TILE&&scy>-TILE*2/zoom&&scy<vh+TILE){
            const npcPx=m.pos.x*TILE+TILE/2,npcPy=m.pos.y*TILE+TILE/2;
            const ddx=player.x-npcPx,ddy=player.y-npcPy;
            const ndir=Math.abs(ddx)>Math.abs(ddy)?(ddx>0?2:1):(ddy>0?0:3);
            ctx.shadowColor=DISTRICT_COLORS[parseInt(id)]||'#fff';ctx.shadowBlur=12;
            drawSprite(sx,sy,ndir,0,m.color,parseInt(id));
            ctx.shadowBlur=0;
        }
    }

    // Ferry terminals (world space)
    for(const f of FERRIES){
        const fx=f.pos.x*TILE, fy=f.pos.y*TILE;
        const fcx=fx-camera.x,fcy=fy-camera.y;
        if(fcx>-TILE*2/zoom&&fcx<vw+TILE&&fcy>-TILE*2/zoom&&fcy<vh+TILE){
            ctx.fillStyle='#8B7355';ctx.fillRect(fx+4,fy+20,24,10);
            ctx.fillStyle='#2a6a9c';ctx.fillRect(fx+2,fy+28,28,4);
            ctx.fillStyle='#fff';ctx.fillRect(fx+8,fy+8,16,14);
            ctx.fillStyle='#2980b9';ctx.fillRect(fx+10,fy+10,12,8);
            ctx.fillStyle='#e74c3c';ctx.fillRect(fx+14,fy+2,2,8);ctx.fillRect(fx+16,fy+2,6,4);
            const bob=Math.sin(Date.now()/400)*2;
            ctx.fillStyle='#3498db';ctx.font='bold 10px monospace';ctx.textAlign='center';
            ctx.fillText('FERRY',fx+16,fy-2+bob);ctx.textAlign='left';
        }
    }

    // Squirrel (world space)
    const sqsx=SQUIRREL.pos.x*TILE, sqsy=SQUIRREL.pos.y*TILE;
    if(sqsx-camera.x>-TILE*2&&sqsx-camera.x<vw+TILE&&sqsy-camera.y>-TILE*2&&sqsy-camera.y<vh+TILE){
        drawSquirrel(sqsx,sqsy);
    }

    // Player (world space)
    const psx=player.x-TILE/2,psy=player.y-TILE/2;
    drawSprite(psx,psy,player.dir,player.frame,{shirt:'#3366cc',hair:'#2c1810',skin:'#d4a574',pants:'#2c3e50'},null);

    ctx.restore(); // End world transform — everything below is screen-space HUD

    if(nearNPC&&state==='playing'){
        ctx.fillStyle='rgba(0,0,0,0.75)';
        ctx.fillRect(W/2-110,H-85,220,30);ctx.strokeStyle='#aaa';ctx.strokeRect(W/2-110,H-85,220,30);
        ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.textAlign='center';
        ctx.fillText('Press SPACE to talk',W/2,H-65);ctx.textAlign='left';
    }

    if(banner.timer>0){
        let a=1;if(banner.timer>150)a=(180-banner.timer)/30;else if(banner.timer<30)a=banner.timer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.fillRect(W/2-210,55,420,50);ctx.strokeStyle=DISTRICT_COLORS[currentDistrict]||'#fff';
        ctx.lineWidth=2;ctx.strokeRect(W/2-210,55,420,50);
        ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';
        ctx.fillText(banner.text,W/2,86);ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }

    // Bridge banner
    if(bridgeBanner.timer>0){
        let a=1;if(bridgeBanner.timer>150)a=(180-bridgeBanner.timer)/30;else if(bridgeBanner.timer<30)a=bridgeBanner.timer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(40,40,40,0.9)';
        const bw=ctx.measureText(bridgeBanner.text).width+60;
        ctx.fillRect(W/2-bw/2,110,bw,36);ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.strokeRect(W/2-bw/2,110,bw,36);
        ctx.fillStyle='#ccc';ctx.font='bold 14px monospace';ctx.textAlign='center';
        ctx.fillText(bridgeBanner.text,W/2,133);
        ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }

    // HUD top-left
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(8,8,220,48);
    ctx.strokeStyle=DISTRICT_COLORS[currentDistrict]||'#555';ctx.strokeRect(8,8,220,48);
    ctx.font='12px monospace';
    if(currentDistrict===52){ctx.fillStyle='#fff';ctx.fillText('Park',16,26);ctx.fillStyle='#4a9e38';ctx.fillText('Green space',16,44);}
    else if(MEMBERS[currentDistrict]){ctx.fillStyle='#fff';ctx.fillText(MEMBERS[currentDistrict].district,16,26);ctx.fillStyle=DISTRICT_COLORS[currentDistrict];ctx.fillText(MEMBERS[currentDistrict].name.substring(0,28),16,44);}

    // Progress
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(W-290,8,282,58);ctx.strokeStyle='#555';ctx.strokeRect(W-290,8,282,58);
    ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText(`Met: ${visitedMembers.size}/10`,W-282,24);
    for(let i=1;i<=51;i++){
        const row=i<=26?0:1;const col=i<=26?i-1:i-27;
        const px=W-282+col*10.5;const py=34+row*12;
        ctx.fillStyle=visitedMembers.has(i)?DISTRICT_COLORS[i]||'#4a4':'#333';ctx.fillRect(px,py,9,9);
    }

    renderMinimap();
    if(state==='dialogue'&&dlg.active) renderDialogue();
    else photoOverlay.style.display='none';

    if(completionTimer>0){
        let a=1;if(completionTimer>330)a=(360-completionTimer)/30;else if(completionTimer<30)a=completionTimer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(W/2-250,H/2-50,500,100);
        ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.strokeRect(W/2-250,H/2-50,500,100);
        ctx.fillStyle='#ffd700';ctx.font='bold 22px monospace';ctx.textAlign='center';
        ctx.fillText('ALL 51 COUNCIL DISTRICTS VISITED!',W/2,H/2-10);
        ctx.fillStyle='#fff';ctx.font='14px monospace';
        ctx.fillText("You've met every member across all 5 boroughs. Democracy achieved.",W/2,H/2+20);
        ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }
}

function renderMinimap() {
    const mmS=120,mmW=mmS,mmH=mmS,mx=W-mmW-14,my=H-mmH-14;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(mx-3,my-3,mmW+6,mmH+6);
    ctx.strokeStyle='#555';ctx.strokeRect(mx-3,my-3,mmW+6,mmH+6);
    const sx=mmW/MAP_W,sy=mmH/MAP_H;
    for(let y=0;y<MAP_H;y+=2)for(let x=0;x<MAP_W;x+=2){
        const d=map[y][x];if(d===0)continue;
        ctx.fillStyle=d===52?'#3a8c28':(DISTRICT_COLORS[d]||'#666');
        ctx.fillRect(mx+x*sx,my+y*sy,Math.ceil(sx*2),Math.ceil(sy*2));
    }
    const ppx=mx+(player.x/TILE)*sx,ppy=my+(player.y/TILE)*sy;
    ctx.fillStyle='#fff';ctx.fillRect(ppx-2,ppy-2,4,4);
    if(Math.floor(Date.now()/400)%2){ctx.fillStyle='#ff0';ctx.fillRect(ppx-1,ppy-1,3,3);}
}

function renderSquirrelDialogue() {
    const boxH = 220, boxY = H - boxH - 10;
    const c = '#8B6914';
    const textX = 50;
    const textW = W - textX - 30;

    // Box
    ctx.fillStyle='rgba(8,20,8,0.95)';ctx.fillRect(16,boxY,W-32,boxH);
    ctx.strokeStyle=c;ctx.lineWidth=3;ctx.strokeRect(16,boxY,W-32,boxH);ctx.lineWidth=1;

    // Name plate
    ctx.font='bold 13px monospace';

    const npW = ctx.measureText(nameStr).width + 24;
    ctx.fillStyle=c;
    ctx.fillRect(textX-4,boxY-14,npW,28);ctx.strokeStyle='#ddd';ctx.strokeRect(textX-4,boxY-14,npW,28);
    ctx.fillStyle='#fff';ctx.fillText(nameStr,textX+6,boxY+4);

    // Tiny squirrel icon in dialogue
    const iconX = 24, iconY = boxY + 24;
    ctx.fillStyle='#8B6914';ctx.fillRect(iconX+2,iconY+8,12,8);
    ctx.fillStyle='#A07818';ctx.fillRect(iconX+3,iconY+3,10,7);
    ctx.fillStyle='#000';ctx.fillRect(iconX+5,iconY+5,2,2);ctx.fillRect(iconX+9,iconY+5,2,2);
    ctx.fillStyle='#A07818';ctx.beginPath();ctx.ellipse(iconX,iconY+4,4,6,-0.3,0,Math.PI*2);ctx.fill();

    if(dlg.phase==='greeting'||dlg.phase==='sqresponse') {
        dlg.ct++; if(dlg.ct>=1){dlg.chars=Math.min(dlg.text.length,dlg.chars+2);dlg.ct=0;}
        ctx.fillStyle='#eee';ctx.font='13px monospace';
        wrapText(dlg.text.substring(0,dlg.chars),textX,boxY+36,textW,16);
        if(dlg.chars>=dlg.text.length&&Math.floor(Date.now()/500)%2){
            ctx.fillStyle='#aaa';ctx.font='12px monospace';ctx.textAlign='right';
            ctx.fillText('SPACE \u25bc',W-40,boxY+boxH-14);ctx.textAlign='left';
        }
    }

    if(dlg.phase==='sqmenu') {
        ctx.fillStyle='#ccc';ctx.font='13px monospace';ctx.fillText('*twitches tail* What do you want to know?',textX,boxY+34);

// ═══════════════════════════
// ADDRESS SEARCH
// ═══════════════════════════
const searchBox = document.getElementById('search-box');
const addrInput = document.getElementById('addr-input');
const addrResults = document.getElementById('addr-results');
let searchOpen = false;
let searchTimeout = null;
let searchSelIdx = -1;

// Map coordinates (must match the projection used to generate tile map)
const GEO_MIN_LON=-74.26, GEO_MAX_LON=-74.26+224/400, GEO_MIN_LAT=40.92-184/434.78, GEO_MAX_LAT=40.92;

function openSearch() {
    searchOpen = true;
    searchBox.classList.add('active');
    addrInput.value = '';
    addrResults.innerHTML = '';
    searchSelIdx = -1;
    setTimeout(() => addrInput.focus(), 50);
}

function closeSearch() {
    searchOpen = false;
    searchBox.classList.remove('active');
    addrInput.blur();
    addrResults.innerHTML = '';
    canvas.focus();
}

function teleportTo(lon, lat) {
    const tx = (lon - GEO_MIN_LON) / (GEO_MAX_LON - GEO_MIN_LON) * MAP_W;
    const ty = (1 - (lat - GEO_MIN_LAT) / (GEO_MAX_LAT - GEO_MIN_LAT)) * MAP_H;
    const txi = Math.floor(tx), tyi = Math.floor(ty);

    // Find nearest land tile if the exact spot is water
    let destX = tx, destY = ty;
    if (txi < 0 || tyi < 0 || txi >= MAP_W || tyi >= MAP_H || map[tyi][txi] === 0) {
        let best = null;
        for (let dy = -5; dy <= 5; dy++) {
            for (let dx = -5; dx <= 5; dx++) {
                const nx = txi+dx, ny = tyi+dy;
                if (nx >= 0 && ny >= 0 && nx < MAP_W && ny < MAP_H && map[ny][nx] > 0) {
                    const d = dx*dx + dy*dy;
                    if (!best || d < best.d) best = {d, x:nx, y:ny};
                }
            }
        }
        if (best) { destX = best.x + 0.5; destY = best.y + 0.5; }
    }

    player.x = destX * TILE;
    player.y = destY * TILE;
    camera.x = player.x - W/2;
    camera.y = player.y - H/2;
    camera.x = Math.max(0, Math.min(MAP_W*TILE-W, camera.x));
    camera.y = Math.max(0, Math.min(MAP_H*TILE-H, camera.y));
    closeSearch();
    if (state === 'title') state = 'playing';
}

function fetchSuggestions(text) {
    if (text.length < 3) { addrResults.innerHTML = ''; return; }
    fetch(`https://geosearch.planninglabs.nyc/v2/autocomplete?text=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(data => {
            const features = (data.features || []).slice(0, 8);
            searchSelIdx = -1;
            if (features.length === 0) {
                addrResults.innerHTML = '<div class="addr-hint">No results found</div>';
                return;
            }
            addrResults.innerHTML = features.map((f, i) =>
                `<div class="addr-result" data-idx="${i}" data-lon="${f.geometry.coordinates[0]}" data-lat="${f.geometry.coordinates[1]}">${f.properties.label}</div>`
            ).join('') + '<div class="addr-hint">Powered by NYC Planning Labs GeoSearch</div>';

            addrResults.querySelectorAll('.addr-result').forEach(el => {
                el.addEventListener('click', () => {
                    teleportTo(parseFloat(el.dataset.lon), parseFloat(el.dataset.lat));
                });
            });
        })
        .catch(() => {
            addrResults.innerHTML = '<div class="addr-hint">Search error</div>';
        });
}

addrInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => fetchSuggestions(addrInput.value), 250);
});

addrInput.addEventListener('keydown', (e) => {
    const items = addrResults.querySelectorAll('.addr-result');
    if (e.key === 'Escape') { closeSearch(); e.preventDefault(); return; }
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchSelIdx = Math.min(items.length - 1, searchSelIdx + 1);
        items.forEach((el, i) => el.classList.toggle('selected', i === searchSelIdx));
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchSelIdx = Math.max(-1, searchSelIdx - 1);
        items.forEach((el, i) => el.classList.toggle('selected', i === searchSelIdx));
    } else if (e.key === 'Enter' && searchSelIdx >= 0 && items[searchSelIdx]) {
        e.preventDefault();
        const el = items[searchSelIdx];
        teleportTo(parseFloat(el.dataset.lon), parseFloat(el.dataset.lat));
    }
    e.stopPropagation(); // Don't let game input handler see these keys
});

// Prevent game keys while search is open
const origKeyDown = document.onkeydown;
document.addEventListener('keydown', (e) => {
    if (searchOpen && e.target === addrInput) return; // let input handle it
    if (!searchOpen && e.key === '/' && state !== 'dialogue') {
        e.preventDefault();
        openSearch();
    }
}, true);

// ═══════════════════════════
// 8-BIT MUSIC ENGINE
// ═══════════════════════════
const musicBtn = document.getElementById('music-btn');
let musicPlaying = false;
let audioCtx = null;
let musicInterval = null;

// Pokemon-style overworld melody (note, octave, duration in 16ths)
// Two channels: melody (square wave) and bass (triangle wave)
const MELODY = [
    // Phrase 1 - cheerful walking theme
    ['E',5,2],['G',5,2],['A',5,2],['B',5,2],['A',5,2],['G',5,2],['E',5,4],
    ['D',5,2],['E',5,2],['G',5,2],['A',5,4],['G',5,2],['E',5,2],
    ['D',5,2],['C',5,2],['D',5,2],['E',5,4],['R',0,2],
    // Phrase 2 - adventurous
    ['E',5,2],['G',5,2],['A',5,2],['B',5,2],['C',6,4],['B',5,2],['A',5,2],
    ['G',5,2],['A',5,2],['B',5,4],['A',5,2],['G',5,2],
    ['E',5,2],['D',5,2],['C',5,2],['E',5,4],['R',0,2],
    // Phrase 3 - uplifting
    ['C',5,2],['E',5,2],['G',5,4],['A',5,2],['G',5,2],['E',5,2],['C',5,2],
    ['D',5,2],['F',5,2],['A',5,4],['G',5,2],['F',5,2],
    ['E',5,2],['G',5,2],['B',5,2],['C',6,4],['R',0,4],
    // Phrase 4 - resolution
    ['C',6,2],['B',5,2],['A',5,2],['G',5,2],['A',5,4],['E',5,4],
    ['D',5,2],['E',5,2],['G',5,2],['A',5,2],['G',5,2],['E',5,2],
    ['C',5,4],['R',0,4],['R',0,4],
];

const BASS = [
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['D',3,4],['D',3,4],['G',2,4],['G',2,4],
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['A',2,4],['A',2,4],['E',2,4],['E',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['C',3,4],['E',3,4],['G',3,4],['A',3,4],['D',3,4],['F',3,4],['A',3,4],['G',3,4],
    ['C',3,4],['E',3,4],['G',3,4],['C',4,4],['A',2,4],['E',3,4],['G',3,4],['R',0,4],
    ['A',2,4],['A',2,4],['A',2,4],['A',2,4],['F',2,4],['G',2,4],
    ['C',3,8],['R',0,4],['R',0,4],
];

const NOTE_FREQ = {C:261.63,D:293.66,E:329.63,F:349.23,G:392.00,A:440.00,B:493.88};

function getFreq(note, octave) {
    if(note === 'R') return 0;
    return NOTE_FREQ[note] * Math.pow(2, octave - 4);
}

function startMusic() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const BPM = 140;
    const sixteenth = 60 / BPM / 4;
    let melIdx = 0, melTime = 0;
    let basIdx = 0, basTime = 0;

    function playNote(freq, duration, type, vol) {
        if(freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration * 0.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function tick() {
        if(!musicPlaying) return;
        // Melody
        if(melTime <= 0 && MELODY.length > 0) {
            const [note, oct, dur] = MELODY[melIdx % MELODY.length];
            const freq = getFreq(note, oct);
            playNote(freq, dur * sixteenth * 0.9, 'square', 0.08);
            melTime = dur;
            melIdx++;
        }
        melTime--;

        // Bass
        if(basTime <= 0 && BASS.length > 0) {
            const [note, oct, dur] = BASS[basIdx % BASS.length];
            const freq = getFreq(note, oct);
            playNote(freq, dur * sixteenth * 0.9, 'triangle', 0.12);
            basTime = dur;
            basIdx++;
        }
        basTime--;
    }

    musicInterval = setInterval(tick, sixteenth * 1000);
    tick();
}

function stopMusic() {
    if(musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

musicBtn.addEventListener('click', () => {
    musicPlaying = !musicPlaying;
    musicBtn.textContent = musicPlaying ? '\u266B ON' : '\u266B OFF';
    musicBtn.classList.toggle('on', musicPlaying);
    if(musicPlaying) startMusic();
    else stopMusic();
});

// ═══════════════════════════
// GAME LOOP
// ═══════════════════════════
function loop(){update();render();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
