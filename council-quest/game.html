* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
canvas {

    image-rendering: crisp-edges;

}
#game-wrap canvas { border-radius: 4px; }
#game-wrap { position: relative; }
#music-btn {
    position: absolute;
    bottom: 12px;
    left: 12px;
    z-index: 10;
    padding: 6px 12px;
    font: bold 12px 'Courier New', monospace;
    background: rgba(10,10,30,0.85);
    color: #888;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
}
#music-btn:hover { border-color: #888; color: #fff; }
#music-btn.on { color: #ffd700; border-color: #ffd700; }
#zoom-controls {
    position: absolute;
    bottom: 12px;
    left: 110px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 4px;
}
#zoom-controls button {
    width: 28px; height: 28px;
    font: bold 14px 'Courier New', monospace;
    background: rgba(10,10,30,0.85);
    color: #aaa;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#zoom-controls button:hover { border-color: #888; color: #fff; }
#zoom-level {
    font: bold 11px 'Courier New', monospace;
    color: #ccc;
    background: rgba(10,10,30,0.85);
    padding: 4px 8px;
    border-radius: 3px;
    min-width: 38px;
    text-align: center;
}
#search-box {
    display: none;
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 380px;
}
#search-box.active { display: block; }
#addr-input {
    width: 100%;
    padding: 8px 12px;
    font: 14px 'Courier New', monospace;
    background: rgba(10,10,30,0.95);
    color: #fff;
    border: 2px solid #2980b9;
    border-radius: 4px;
    outline: none;
}
#addr-input::placeholder { color: #666; }
#addr-input:focus { border-color: #3498db; }
#addr-results {
    max-height: 200px;
    overflow-y: auto;
    background: rgba(10,10,30,0.95);
    border: 2px solid #2980b9;
    border-top: none;
    border-radius: 0 0 4px 4px;
}
#addr-results:empty { display: none; }
.addr-result {
    padding: 8px 12px;
    font: 12px 'Courier New', monospace;
    color: #ccc;
    cursor: pointer;
    border-bottom: 1px solid #1a1a3a;
}
.addr-result:hover, .addr-result.selected {
    background: rgba(41,128,185,0.3);
    color: #fff;
}
.addr-hint {
    padding: 6px 12px;
    font: 10px 'Courier New', monospace;
    color: #555;
    text-align: center;
}
</style>

    11: {name:"Eric Dinowitz",district:"District 11",party:"Democrat",title:"Council Member",color:{shirt:"#3498db",hair:"#3d2b1f",skin:"#6b4226",pants:"#2c3e50"},pos:{x:148,y:14},greeting:"Hi, I'm Eric Dinowitz - born and raised in the Northwest Bronx, now raising my own family in the district I grew up in. I spent thirteen years as a special education teacher in our community, and served as Chapter Leader for the UFT and Aging Chair of Bronx Community Board 8 before joining the Council. Welcome to District 11.",about:"Neighborhoods: Bedford Park, Norwood, Kingsbridge, Riverdale, Wakefield-Woodlawn, Van Cortlandt Park.",landmarks:"Van Cortlandt Park, 1,146 acres of Bronx green space. Wave Hill, the public garden and cultural center overlooking the Hudson. Woodlawn Cemetery, a National Historic Landmark. Riverdale's leafy hillside streets. The Mosholu subway stop I fought to make accessible.",issues:"I chair the Committee on Education because I taught our kids - I know what they need and what the system keeps failing to deliver. I fought to bring an elevator to Mosholu so transit belongs to everyone, including seniors and disabled neighbors. I spent hundreds of hours during the pandemic getting services to older adults, and I chair the Jewish Caucus. Schools, accessibility, seniors - that's the work.",cosponsored:30,email:"District11@council.nyc.gov",social:[["X", "@EricDinowitzNYC", "https://x.com/EricDinowitzNYC"], ["Facebook", "EricDinowitzNYCity", "https://www.facebook.com/EricDinowitzNYCity/"], ["Instagram", "@EricDinowitzNYC", "https://www.instagram.com/EricDinowitzNYC/"]]},
    12: {name:"Kevin C. Riley",district:"District 12",party:"Democrat",title:"Council Member",color:{shirt:"#e67e22",hair:"#2c1810",skin:"#d4a574",pants:"#2c3e50"},pos:{x:166,y:17},greeting:"I'm Kevin C. Riley, Council Member for the 12th District and Chair of the Land Use Committee. Born and raised in the Northeast Bronx, I spent over a decade working with Assembly Speaker Carl Heastie before running to represent the district that raised me. Founding member of The Dad Gang, Kappa Alpha Psi, and proud father of three. Welcome to District 12.",about:"Neighborhoods: Williamsbridge, Eastchester-Edenwald-Baychester, Wakefield, Allerton, Co-op City.",landmarks:"Co-op City, the largest cooperative housing development in the country. The Bronx River winding through the east side. Seton Falls Park, one of the borough's hidden wooded gems. Gun Hill Road, the district's commercial spine. Williamsbridge and the Baychester community centers.",issues:"As Chair of Land Use, I shape housing and development decisions for the whole city - and I keep the voices of communities of color at the center. Since 2021 I've delivered over $130 million in discretionary and capital investments to this district, passed the FDNY Diversity bills, and expanded financial literacy through Invest Fest. My Limitless Leaders program mentors young men in the Bronx because the next generation needs real tools, not platitudes.",cosponsored:40,email:"District12@council.nyc.gov",social:[["X", "@CMKevinCRiley", "https://x.com/CMKevinCRiley"], ["Facebook", "CMKevinCRiley", "https://www.facebook.com/CMKevinCRiley"], ["Instagram", "@CMKevinCRiley", "https://www.instagram.com/CMKevinCRiley/"]]},
    13: {name:"Shirley Aldebol",district:"District 13",party:"Democrat",title:"Council Member",color:{shirt:"#27ae60",hair:"#aaa",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:172,y:31},greeting:"I'm Shirley Aldebol - born and raised in the Bronx, daughter of Puerto Rican parents who worked a Soundview bodega so my generation could have better. I spent 35-plus years in the labor movement, the last 20 as Executive Vice President of 32BJ SEIU. I raised my son Emilio as a single mother in Throggs Neck. Welcome to District 13.",about:"Neighborhoods: Throggs Neck, Pelham Bay-City Island, Morris Park, Pelham Bay Park.",landmarks:"Pelham Bay Park, the city's largest at 2,772 acres. City Island, a New England fishing village inside the Bronx. Orchard Beach, Robert Moses' Riviera. Morris Park's Italian-American main street. Hart Island across the sound. Ferry Point Park and the St. Raymond's coastline.",issues:"I chair the Committee on Civil Service and Labor because I came up in that fight - from winning collective bargaining for Puerto Rico public employees to securing prevailing wage for NYC school cleaners. I also sit on Aging, Hospitals, and Women and Gender Equity. My priorities are higher wages and benefits for workers, affordable housing, universal child care, and real access to mental health care. That's the whole platform.",cosponsored:30,email:"District13@council.nyc.gov",social:[["X", "@shirley4council", "https://x.com/shirley4council"], ["Instagram", "@shirleyaldebol.nyc", "https://www.instagram.com/shirleyaldebol.nyc/"]]},
    14: {name:"Pierina Ana Sanchez",district:"District 14",party:"Democrat",title:"Council Member",color:{shirt:"#9b59b6",hair:"#555",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:140,y:25},greeting:"Hola, I'm Pierina Ana Sanchez - Afro-Dominicana, daughter of immigrants, born and raised in the Bronx. My elders sold oranges, drove taxis, and cleaned buildings so I could make it. I went from P.S. 46 to Harvard on full scholarship to Princeton for public affairs, then came home to serve. I'm proud to chair the Council's Committee on Housing and Buildings. Welcome to District 14.",about:"Neighborhoods: University Heights, Morris Heights, Fordham Heights, Kingsbridge.",landmarks:"Fordham Road, the borough's busiest shopping corridor. The Grand Concourse, the Bronx's Champs-Elysees. Bronx Community College on the old NYU campus. P.S. 46 and M.S. 45, my own schools. The Jerome Avenue corridor I helped organize during rezoning.",issues:"I chair Housing and Buildings because housing is the fight for this district. I cut my teeth organizing tenants to force landlord repairs, then cofounded the Jerome Avenue Revitalization Collaborative during that rezoning. I've worked in the Obama White House, the mayor's office, and Regional Plan Association - every role came back to racial and housing justice. Deep affordability, worker protections, and real investment in immigrant families. That's what I was sent to fight for.",cosponsored:42,email:"District14@council.nyc.gov",social:[["X", "@CMPiSanchez", "https://x.com/CMPiSanchez"], ["Instagram", "@pierinasancheznyc", "https://www.instagram.com/pierinasancheznyc/"]]},
    15: {name:"Oswald Feliz",district:"District 15",party:"Democrat",title:"Council Member",color:{shirt:"#e74c3c",hair:"#1a1a1a",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:148,y:29},greeting:"I'm Oswald Feliz, lifelong Bronxite and Council Member for District 15. I'm a graduate of P.S. 46, M.S. 45, Walton High, Bronx Community College, Lehman, and CUNY School of Law - all public. Before I took office, I was a tenant lawyer who won a six-figure settlement for a building of neighbors against a slumlord. I also chair the Public Safety Committee. Welcome to District 15.",about:"Neighborhoods: Fordham, East Tremont, Belmont, Bathgate, Crotona Park, Mount Hope.",landmarks:"The Bronx Zoo, 265 acres and the largest metropolitan zoo in the country. The New York Botanical Garden right next door. Arthur Avenue, the real Little Italy. Fordham University and the Belmont neighborhood around it. The Crotona Park green space and the West Farms waterfront.",issues:"I chair Public Safety, and I approach it the way I approached tenant law - with the people who live here, not over them. I defended Bronx families against eviction and harassment before I defended this district at City Hall. My commitment is simple: good schools, safe streets, and a shot at growth shouldn't depend on which block you were born on. Housing quality, public safety, and small-business support go together.",cosponsored:39,email:"District15@council.nyc.gov",social:[["X", "@OswaldFeliz", "https://x.com/OswaldFeliz"], ["Instagram", "@OswaldFeliz", "https://www.instagram.com/OswaldFeliz/"]]},
    16: {name:"Althea Stevens",district:"District 16",party:"Democrat",title:"Council Member",color:{shirt:"#f39c12",hair:"#3d2b1f",skin:"#8d6e54",pants:"#2c3e50"},pos:{x:136,y:36},greeting:"I'm Althea Stevens, Council Member for District 16 and Chair of the Committee on Children and Youth. I'm a proud New York native and a single teen mother - I've spent more than 15 years in civic service with nonprofits and community centers that give a voice to our most vulnerable neighbors. Welcome to District 16.",about:"Neighborhoods: Morrisania, Concourse, Highbridge, Mount Eden, Yankee Stadium.",landmarks:"Yankee Stadium, the House That Ruth Built (the second one). The Grand Concourse running straight through the district. Highbridge Park and the restored High Bridge itself, the city's oldest. Mount Eden and Concourse Village. Claremont Park's green hills above Morrisania.",issues:"I chair Children and Youth because our kids have been under-resourced for too long. I came up running youth forums, voting-rights sessions, and workshops on gang policing - meeting people where they are. In the Council I fight for human-services wages (the workers who hold up our safety net are paid like an afterthought), real child care, and youth development that actually reaches Morrisania, Highbridge, and Mount Eden. Under-resourced neighborhoods deserve first-class investment.",cosponsored:125,email:"District16@council.nyc.gov",social:[["X", "@A_StevensD16", "https://x.com/A_StevensD16"], ["Instagram", "@a_stevensd16", "https://www.instagram.com/a_stevensd16/"]]},
    17: {name:"Justin Sanchez",district:"District 17",party:"Democrat",title:"Council Member",color:{shirt:"#2ecc71",hair:"#2c1810",skin:"#6b4226",pants:"#2c3e50"},pos:{x:146,y:43},greeting:"I'm Justin Sanchez, Council Member for the South Bronx's 17th District and Chair of the Sanitation and Solid Waste Committee. Raised by a single teenage mother and first-generation American grandparents, I grew up moving between buildings and schools across the Bronx. I'm a Bronx Science graduate, CUNY valedictorian, NYU MPA, and a current Fordham Law student. I co-chair the Council's LGBTIQA Caucus. Welcome to District 17.",about:"Neighborhoods: Mott Haven, Melrose, Hunts Point, Longwood, Morrisania, Soundview.",landmarks:"Hunts Point Market, where most of the city's produce, meat, and fish moves through every night. The Hub at 149th and Third, the South Bronx's historic retail heart. Bronx River Art Center on the restored waterway. Mott Haven's cast-iron historic district. St. Mary's Park and the Melrose Commons.",issues:"I chair Sanitation because the South Bronx has carried the city's waste burden for decades - the trucks, the transfer stations, the asthma rates - and that has to change. I'm fighting for a cleaner, safer, stronger, more affordable South Bronx: environmental justice at Hunts Point, real housing protections for the working families I grew up with, and food access in neighborhoods the market has written off. I sit on Public Safety, Transportation, Finance, and Environmental Protection too - because all of it connects.",cosponsored:49,email:"District17@council.nyc.gov",social:[["Instagram", "@councilmembersanchez", "https://www.instagram.com/councilmembersanchez/"]]},
    18: {name:"Amanda Farias",district:"District 18",party:"Democrat",title:"Council Member",color:{shirt:"#e91e63",hair:"#aaa",skin:"#d4a574",pants:"#2c3e50"},pos:{x:160,y:40},greeting:"I'm Amanda Farias, second-generation Afro-Latina of Puerto Rican and Dominican descent, raised in Soundview. I went from P.S. 69X and the Kips Bay Boys and Girls Club to St. John's for a BA and MA in government. I served as the first Latina Majority Leader of the NYC Council, and I now chair the Committee on Women and Gender Equity in my second and final term representing District 18. Welcome.",about:"Neighborhoods: Soundview, Castle Hill, Parkchester, Westchester Square.",landmarks:"Parkchester, the 12,000-unit planned community that taught a city how to build middle-class housing. Westchester Square, the old colonial village and transit hub. Ferry Point Park on the East River. Soundview Park where the Bronx River meets the sound. Castle Hill and Clason Point along the waterfront.",issues:"As Chair of Women and Gender Equity - and previously four years chairing Economic Development as the first woman, Bronxite, and Latinx person in that role - I've codified the NYC ferry discount, established a citywide industrial development plan, and helped pass the Universal Childcare package, the NYC Abortion Rights Act, the Support Survivors package, and Menstrual Equity. Food insecurity is personal here: I've put over $50,000 in Health Bucks into local farmers markets and fed more than 1,000 neighbors through my office. I've delivered $34.5 million in capital and expense funding to this district in my first two years.",cosponsored:57,email:"District18@council.nyc.gov",social:[["X", "@CMAmandaFarias", "https://x.com/CMAmandaFarias"], ["Instagram", "@CMAmandaFarias", "https://www.instagram.com/CMAmandaFarias/"]]},
    19: {name:"Vickie Paladino",district:"District 19",party:"Republican",title:"Council Member",color:{shirt:"#c0392b",hair:"#555",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:185,y:62},greeting:"Hi, I'm Vickie Paladino - born in Whitestone, raised by a widowed mother after my WWII-veteran dad died when I was six. I spent nearly 40 years raising a family and running two small businesses here before I ever ran for office. Elected in 2021, appointed Minority Whip in 2025. Welcome to District 19.",about:"Neighborhoods: College Point, Whitestone, Flushing, Bayside, Douglaston-Little Neck.",landmarks:"Fort Totten, the former Army post on Little Neck Bay. Bayside Marina, our working waterfront. Alley Pond Park, the second-largest park in Queens. The College Point industrial corridor. Francis Lewis Boulevard, the spine of the district.",issues:"I ran on change and transparency, and I hold leaders accountable every single day. My priorities are public safety and backing the NYPD, protecting quality of life, supporting small business owners like the ones I used to be, strong schools, and making sure government answers to the people paying for it. Common sense, direct talk, no apologies.",cosponsored:36,email:"District19@council.nyc.gov",social:[["X", "@VickieforNYC", "https://x.com/VickieforNYC"], ["Instagram", "@VickieforNYC", "https://www.instagram.com/VickieforNYC/"]]},
    20: {name:"Sandra Ung",district:"District 20",party:"Democrat",title:"Council Member",color:{shirt:"#ff6b6b",hair:"#1a1a1a",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:178,y:72},greeting:"Hello, I'm Sandra Ung. My family escaped the Cambodian genocide when I was seven and started over in Flushing. I went to P.S. 22, J.H.S. 189, Flushing High, Hunter College, and Columbia Law. I still live next door to my mother and I'm her primary caretaker. Welcome to District 20.",about:"Neighborhoods: Flushing, Murray Hill, Queensboro Hill, Fresh Meadows.",landmarks:"Flushing Meadows-Corona Park, home of two World's Fairs. Queens Botanical Garden. Main Street Flushing, one of the busiest commercial corridors in the city. Mitchell-Linden's co-ops. The Flushing YMCA, where I served on the board.",issues:"I spent my career as an attorney defending domestic violence survivors, then worked in Congresswoman Grace Meng's office helping constituents navigate immigration, veterans, and Social Security. That's the work I bring to the Council - real services for immigrants, protection for survivors, support for small businesses, affordable child care, and expanding women and minority representation through At the Table PAC.",cosponsored:86,email:"District20@council.nyc.gov",social:[["X", "@CMSandraUng", "https://x.com/CMSandraUng"], ["Instagram", "@CMSandraUng", "https://www.instagram.com/CMSandraUng/"]]},
    21: {name:"Shanel Thomas-Henry",district:"District 21",party:"Democrat",title:"Council Member",color:{shirt:"#a855f7",hair:"#3d2b1f",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:158,y:69},greeting:"Hey, I'm Shanel Thomas-Henry - a lifelong resident of Corona and East Elmhurst, now Chair of the Council's Committee on Small Business. My dad is a 20-year retired Army First Sergeant, my mom drove buses for NYC Transit, and I grew up around my family's businesses on Northern Boulevard. Welcome to District 21.",about:"Neighborhoods: Jackson Heights, East Elmhurst, Corona, Elmhurst, Flushing Meadows.",landmarks:"LaGuardia Airport, our noisy neighbor and major employer. Flushing Meadows-Corona Park. Citi Field and the Mets. The small business corridors of Northern Boulevard and Roosevelt Avenue. LeFrak City, home to tens of thousands. Jackson Heights, one of the most diverse neighborhoods on earth.",issues:"I chair Small Business because local entrepreneurship is how working families in neighborhoods like mine build stability. I focus on economic development, education, and community investment - connecting residents to jobs, scholarships, workforce training, and city resources. Two decades of community development taught me that opportunity has to be delivered block by block, not just announced at press conferences.",cosponsored:19,email:"District21@council.nyc.gov",social:[["Instagram", "@shanelforcouncil", "https://www.instagram.com/shanelforcouncil/"]]},
    22: {name:"Tiffany Caban",district:"District 22",party:"Democrat",title:"Council Member",color:{shirt:"#ff69b4",hair:"#2c1810",skin:"#8d6e54",pants:"#2c3e50"},pos:{x:140,y:63},greeting:"Hi, I'm Tiffany Caban - born in Richmond Hill to Puerto Rican parents who grew up in Woodside Houses. I went to PS 62, JHS 210, and St. Francis Prep, then Penn State and New York Law School. Before the Council I was a public defender representing over a thousand people who couldn't afford a lawyer. Welcome to District 22.",about:"Neighborhoods: Astoria, Queensbridge, Jackson Heights, East Elmhurst, Rikers Island.",landmarks:"Astoria Park, with its WPA-era pool under the Hell Gate Bridge. Museum of the Moving Image. Socrates Sculpture Park on the East River. Queensbridge Houses, the largest public housing development in North America. Rikers Island, which we are legally required to close. Astoria Houses.",issues:"I chair Mental Health and Substance Use and co-chair the Progressive Caucus. I've passed legislation for survivors of gender-based violence, protected abortion care in NYC, and pushed to move homeless New Yorkers into permanent housing faster. My years as a public defender showed me the worst inequities of criminal justice, and I ran to redefine how we approach public health and public safety.",cosponsored:100,email:"District22@council.nyc.gov",social:[["X", "@CabanD22", "https://x.com/CabanD22"], ["Instagram", "@Tiffany_Caban", "https://www.instagram.com/Tiffany_Caban/"]]},
    23: {name:"Linda Lee",district:"District 23",party:"Democrat",title:"Council Member",color:{shirt:"#00bcd4",hair:"#aaa",skin:"#6b4226",pants:"#2c3e50"},pos:{x:205,y:78},greeting:"Hi, I'm Linda Lee - the first Korean-American ever elected to the New York City Council and the first woman to hold this seat. Before office I was President and CEO of Korean Community Services, serving 1,300 people a day across aging, mental health, workforce, and immigration. The Obama White House named us a Champion of Change. Welcome to District 23.",about:"Neighborhoods: Fresh Meadows, Jamaica Estates, Bayside, Douglaston, Queens Village, Hollis.",landmarks:"Cunningham Park, 358 acres of ballfields and woodland. Alley Pond Park and its giant tulip tree. The stately streets of Jamaica Estates. Oakland Gardens. Bell Boulevard in Bayside, our main street. Fresh Meadows, a mid-century planned community.",issues:"I chair the Committee on Finance. I built the city's Mental Health Roadmap because I spent my career running the only State-licensed Article 31 mental health clinic serving Korean-Americans. My priorities are senior services, strong public schools, public safety that works with communities, and culturally competent care for immigrant families who have been overlooked by the system for too long.",cosponsored:52,email:"District23@council.nyc.gov",social:[["X", "@CMLindaLee", "https://x.com/CMLindaLee"], ["Instagram", "@CMLindaLee", "https://www.instagram.com/CMLindaLee/"]]},
    24: {name:"James F. Gennaro",district:"District 24",party:"Democrat",title:"Council Member",color:{shirt:"#4caf50",hair:"#555",skin:"#d4a574",pants:"#2c3e50"},pos:{x:179,y:84},greeting:"Hi, I'm Jim Gennaro - a Democratic Council Member serving my second tour of duty in District 24. I served from 2002 to 2013, returned in 2021, and I chair the Committee on Environmental Protection, Resiliency and Waterfronts. I've authored more than 50 laws, including Tobacco 21 - the first-in-the-nation law raising the tobacco sale age, now national policy. Welcome to District 24.",about:"Neighborhoods: Rego Park, Forest Hills, Kew Gardens Hills, Fresh Meadows, Jamaica Hills.",landmarks:"Forest Hills Gardens, the 1909 planned garden suburb. Flushing Meadows-Corona Park on our northern edge. Briarwood and Jamaica Hills. The co-ops of Electchester, built by the electricians' union. Kew Gardens Hills and its vibrant commercial strips. Mount Hebron Cemetery.",issues:"I am the guiding hand of environmental policy at the Council. I hold the city accountable to its emissions goals and push for storm resiliency as superstorms grow more frequent. Tobacco 21 has saved countless lives. I also authored protections for women against domestic violence and consumer safeguards, and I've called for a dangerousness standard in our courts to address rising crime.",cosponsored:21,email:"District24@council.nyc.gov",social:[["X", "@JimGennaro", "https://x.com/JimGennaro"]]},
    25: {name:"Shekar Krishnan",district:"District 25",party:"Democrat",title:"Council Member",color:{shirt:"#ff9800",hair:"#1a1a1a",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:149,y:73},greeting:"Hi, I'm Shekar Krishnan - the first Indian-American ever elected to the New York City Council, representing Jackson Heights, Elmhurst, East Elmhurst, and Woodside. These are some of the most diverse immigrant communities on earth, and thousands of our neighbors are essential workers who keep this city running. Welcome to District 25.",about:"Neighborhoods: Jackson Heights, Elmhurst, East Elmhurst, Woodside.",landmarks:"Diversity Plaza on 37th Road, the beating heart of immigrant New York. The Jackson Heights Historic District with its garden apartments. Elmhurst Hospital, our public safety net. Travers Park. 74th Street, the South Asian commercial corridor. Roosevelt Avenue under the 7 train.",issues:"I chair Oversight and Investigations, and I previously chaired Parks and Recreation, where I negotiated the highest NYC Parks budget ever. I passed the largest worker protection bill for Uber and Lyft drivers in the nation and legislation to decriminalize street vending. I secured the first-ever hand surgery clinic at Elmhurst Hospital for construction workers. District 25 has the least green space in the city - I'm fighting to change that.",cosponsored:71,email:"District25@council.nyc.gov",social:[["X", "@voteshekar", "https://x.com/voteshekar"], ["Instagram", "@voteshekar", "https://www.instagram.com/voteshekar/"]]},
    26: {name:"Julie Won",district:"District 26",party:"Democrat",title:"Council Member",color:{shirt:"#795548",hair:"#3d2b1f",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:133,y:76},greeting:"Hi, I'm Julie Won - the first woman and first immigrant to represent District 26 in the city's history. I came to New York from Korea at age eight, an experience I share with over half of my constituents. I spent a decade at IBM advising the federal government on technology before I ran. Welcome to District 26.",about:"Neighborhoods: Long Island City, Sunnyside, Woodside, Astoria, Maspeth.",landmarks:"The Long Island City skyline and Gantry Plaza State Park on the East River. The Sunnyside Arch over Queens Boulevard. MoMA PS1, a contemporary art powerhouse. Queensbridge Houses. Sunnyside Yards, the rail yard that will reshape our district. Calvary Cemetery.",issues:"I chair Workforce Development and I co-chair the Black, Latino and Asian Caucus. I lead the OneLIC neighborhood planning process because when developers plan for us, we lose. My priorities are transparency, procurement reform, street safety on our deadliest corridors, creating and preserving affordable housing, and making city technology actually work for working people - the same mission I had at IBM.",cosponsored:48,email:"District26@council.nyc.gov",social:[["X", "@CMJulieWon", "https://x.com/CMJulieWon"], ["Instagram", "@CM_JulieWon", "https://www.instagram.com/CM_JulieWon/"]]},
    27: {name:"Nantasha Williams",district:"District 27",party:"Democrat",title:"Council Member",color:{shirt:"#607d8b",hair:"#2c1810",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:199,y:95},greeting:"Hi, I'm Deputy Speaker Dr. Nantasha Williams, representing Southeast Queens - the community I grew up in. I was raised by a single mother who worked as a city social worker, and I learned early what it takes to fight for our most vulnerable neighbors. Before office I founded the NYC Black Women's Political Club. Welcome to District 27.",about:"Neighborhoods: Jamaica, St. Albans, Hollis, Queens Village, Cambria Heights, Laurelton.",landmarks:"Jamaica Center, the commercial and transit hub of Southeast Queens. King Manor Museum, home of Founding Father Rufus King. Rochdale Village, one of the largest co-op complexes in the country. Addisleigh Park, where Count Basie and Jackie Robinson lived. St. Albans. The Jamaica Neighborhood Plan area.",issues:"I chair Cultural Affairs, Libraries and International Relations as Deputy Speaker. My top priorities are creating new economic opportunities, youth development, housing, and protecting seniors. I'm a nationally recognized political strategist who has spent my life organizing for women, girls, and marginalized communities. Southeast Queens built Black middle-class New York, and my job is to protect that legacy and grow it.",cosponsored:50,email:"District27@council.nyc.gov",social:[["X", "@CMNantashaW", "https://x.com/CMNantashaW"], ["Instagram", "@cmnantashawilliams", "https://www.instagram.com/cmnantashawilliams/"]]},
    28: {name:"Ty Hankerson",district:"District 28",party:"Democrat",title:"Council Member",color:{shirt:"#009688",hair:"#aaa",skin:"#8d6e54",pants:"#2c3e50"},pos:{x:182,y:104},greeting:"Hi, I'm Ty Hankerson, representing what we call The Great 28 - South Jamaica, South Richmond Hill, Rochdale Village, and South Ozone Park. I was born in South Ozone Park and raised in every corner of this district. Before office I served as District Chief of Staff to Speaker Adrienne E. Adams. Welcome to District 28.",about:"Neighborhoods: South Ozone Park, South Jamaica, Springfield Gardens, Brookville.",landmarks:"Baisley Pond Park, 109 acres around a former Brooklyn water supply pond. Springfield Gardens. Rochdale Village co-ops. The industrial and freight corridors near JFK Airport. The small business strips of Linden Boulevard and Rockaway Boulevard. South Ozone Park's tight-knit blocks.",issues:"My goal is simple: a government that serves and delivers for everyone, no matter who you are or where you're from. I built coalitions across civic associations, faith leaders, small business corridors, and youth groups to hold city agencies accountable and make sure District 28 gets its fair share. That means real community investment, green space, and infrastructure that reflects how hard this district works.",cosponsored:30,email:"District28@council.nyc.gov",social:[["X", "@TyHankerson", "https://x.com/TyHankerson"], ["Instagram", "@cmtyhankerson", "https://www.instagram.com/cmtyhankerson/"]]},
    29: {name:"Lynn Schulman",district:"District 29",party:"Democrat",title:"Council Member",color:{shirt:"#8bc34a",hair:"#555",skin:"#6b4226",pants:"#2c3e50"},pos:{x:168,y:91},greeting:"Hi, I'm Lynn Schulman - I grew up in Forest Hills and I've been a community and LGBTQ activist here for decades. I'm an attorney by training, and I've held executive roles in government, industry, and nonprofits, mostly focused on health care advocacy. I served as Vice-Chair of Community Board 6 for more than 20 years. Welcome to District 29.",about:"Neighborhoods: Rego Park, Forest Hills, Kew Gardens, Richmond Hill, Ozone Park.",landmarks:"Forest Hills Stadium, where the US Open used to crown champions and the Beatles once played. The Tudor streets of Kew Gardens. Queens Boulevard, long nicknamed the Boulevard of Death, now being redesigned. Richmond Hill's Victorian houses. Metropolitan Avenue in Forest Hills. Austin Street.",issues:"My focus is maternal health, small business support, and senior services - the issues I worked on for years before I ran. I served on the 112th Precinct Community Council, the Forest Hills Chamber board, and Community Education Council 28, where I fought bullying and expanded access to music and arts. Decades of health care advocacy taught me that policy only matters if it actually reaches people.",cosponsored:98,email:"District29@council.nyc.gov",social:[["X", "@Lynn4NYC", "https://x.com/Lynn4NYC"], ["Instagram", "@Lynn4NYC", "https://www.instagram.com/Lynn4NYC/"]]},
    30: {name:"Phil Wong",district:"District 30",party:"Democrat",title:"Council Member",color:{shirt:"#cddc39",hair:"#1a1a1a",skin:"#d4a574",pants:"#2c3e50"},pos:{x:148,y:87},greeting:"Hi, I'm Phil Wong. My family immigrated to the U.S. in 1974 to escape communism, and I've lived in Elmhurst since 1976. I went to public schools in Elmhurst and Maspeth, then Jamaica High School and Cornell. I raised my three daughters here and sent them all through NYC public schools. Welcome to District 30.",about:"Neighborhoods: Maspeth, Middle Village, Glendale, Elmhurst, Ridgewood.",landmarks:"Juniper Valley Park, the green heart of Middle Village. Middle Village's quiet residential streets. The Shops at Atlas Park in Glendale. Maspeth's working industrial core. St. John Cemetery. The commercial strip along Grand Avenue.",issues:"As a homeowner, small business owner, and public-school dad, I care about quality of life and accountable government. When a homeless shelter opened in Elmhurst without community notice, I organized residents and demanded transparency. I support strong community-police relations, safe and academically strong schools, environmental sustainability, and making sure neighborhood stability isn't sacrificed to policies written without us.",cosponsored:60,email:"District30@council.nyc.gov",social:[["X", "@PhilWongNYC2025", "https://x.com/PhilWongNYC2025"], ["Instagram", "@philwongnyc2025", "https://www.instagram.com/philwongnyc2025/"]]},
    31: {name:"Selvena N. Brooks-Powers",district:"District 31",party:"Democrat",title:"Council Member",color:{shirt:"#ff5722",hair:"#3d2b1f",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:194,y:121},greeting:"Hi, I'm Selvena N. Brooks-Powers - the first-ever Black woman to serve as the City Council's Majority Whip and the first Chair of the new Committee on Transportation and Infrastructure. I now chair the Committee on Criminal Justice, overseeing the closure of Rikers Island. Welcome to District 31.",about:"Neighborhoods: Far Rockaway, Laurelton, Rosedale, Springfield Gardens, Arverne.",landmarks:"Far Rockaway Beach and the boardwalk. Jamaica Bay and its wildlife refuge. The JFK Airport perimeter that dominates our economy. Laurelton's Tudor homes. Edgemere and Arverne along the peninsula. Rosedale's quiet residential streets.",issues:"I've directed over $470 million in capital and discretionary funds to schools, parks, firehouses, and infrastructure in a district the city underserved for too long. I secured $95 million to restore the 116th Precinct and $50 million plus land for a trauma center on the Rockaway Peninsula. My fights are transportation equity, coastal resilience for a peninsula facing the ocean, and street safety that actually saves lives.",cosponsored:150,email:"District31@council.nyc.gov",social:[["X", "@CMBrooksPowers", "https://x.com/CMBrooksPowers"], ["Instagram", "@cmselvenabrookspowers", "https://www.instagram.com/cmselvenabrookspowers/"]]},
    32: {name:"Joann Ariola",district:"District 32",party:"Republican",title:"Council Member",color:{shirt:"#c62828",hair:"#2c1810",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:160,y:115},greeting:"Hi, I'm Joann Ariola - a lifelong resident of District 32, born in Ozone Park and raised in Howard Beach. I went to P.S. 63, P.S. 207, Our Lady of Grace, Stella Maris on the Rockaway Peninsula, and Adelphi Business School. I won my 2021 primary with over 80 percent and now serve as a leader among Council Republicans. Welcome to District 32.",about:"Neighborhoods: Woodhaven, Ozone Park, Howard Beach, Rockaway Beach, Broad Channel, Breezy Point.",landmarks:"Rockaway Beach and the boardwalk. Jacob Riis Park, the People's Beach. Forest Park, the third-largest park in Queens. Broad Channel, the only inhabited island in Jamaica Bay. Howard Beach. Breezy Point at the tip of the peninsula. Fort Tilden.",issues:"I chair the Committee on Fire and Emergency Management and co-chair the Irish and Italian Caucuses. I've led the Republican fight against vaccine mandates and illegal immigration, defended religious freedom, and demanded agency accountability to taxpayers. My focus is quality of life - clean streets, more NYPD officers in our precincts, disaster preparedness for a coastal district, and honoring our veterans and first responders.",cosponsored:58,email:"District32@council.nyc.gov",social:[["X", "@JoannAriola32", "https://x.com/JoannAriola32"], ["Instagram", "@joannariola32", "https://www.instagram.com/joannariola32/"]]},
    33: {name:"Lincoln Restler",district:"District 33",party:"Democrat",title:"Council Member",color:{shirt:"#1565c0",hair:"#aaa",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:117,y:90},greeting:"Hi, I'm Lincoln Restler - born and raised in the 33rd District. Before the Council, I served as Deputy Chief of Staff to Mayor de Blasio and helped design IDNYC. Now I chair the Committee on Contracts and run oversight on City Hall. I'm a 24/7 problem solver - town halls, constituent cases, showing up. Welcome to District 33.",about:"Neighborhoods: Greenpoint, Williamsburg, Brooklyn Heights, DUMBO, Boerum Hill, Brooklyn Navy Yard.",landmarks:"Brooklyn Bridge Park on the waterfront. DUMBO's cobblestone streets under the bridges. Brooklyn Heights Promenade with its skyline view. The Brooklyn Navy Yard's working industrial campus. Atlantic Avenue, the corridor I helped make safer. McGuinness Boulevard in Greenpoint.",issues:"Affordable housing, tenant protections, and cleaner streets are non-negotiable. As Chair of Contracts and former Chair of Governmental Operations, I've run oversight on the Adams administration and held the Mayor accountable. I fought for safer streets on Atlantic Ave and McGuinness Boulevard, and I keep pushing legislation to make this city cleaner, safer, and greener. Good government isn't a slogan - it's the job.",cosponsored:96,email:"District33@council.nyc.gov",social:[["X", "@CMRestler", "https://x.com/CMRestler"], ["Instagram", "@lincolnforcouncil", "https://www.instagram.com/lincolnforcouncil/"]]},
    34: {name:"Jennifer Gutierrez",district:"District 34",party:"Democrat",title:"Council Member",color:{shirt:"#ad1457",hair:"#1a1a1a",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:129,y:91},greeting:"Hey! I'm Jennifer Gutierrez - first Colombian-American on the NYC Council. Daughter of immigrants, raised in a one-bedroom Queens apartment. I used to interpret for my mother and negotiate her wages as a domestic worker. That's where I learned to fight. Welcome to District 34.",about:"Neighborhoods: Williamsburg, South Williamsburg, East Williamsburg, Bushwick (West), Bushwick (East), Ridgewood.",landmarks:"Williamsburg Bridge. Bushwick street art scene. Maria Hernandez Park. The city's third-largest industrial business zone. Domino Park on the waterfront.",issues:"Real estate is not here to serve us. When we let developers do the planning, we get displacement and more people in shelters. I fight for permanent programs - not pilots, not grants, not maybes. I built the GUARD Act for AI oversight, made the doula program permanent, and I won't stop until every family in this district can afford to stay.",cosponsored:63,email:"District34@council.nyc.gov",social:[["X","@CMJenGutierrez","https://x.com/CMJenGutierrez"],["Instagram","@jengutierreznyc","https://www.instagram.com/jengutierreznyc/"],["Bluesky","@cmjengutierrez","https://bsky.app/profile/cmjengutierrez.bsky.social"]]},
    35: {name:"Crystal Hudson",district:"District 35",party:"Democrat",title:"Council Member",color:{shirt:"#6a1b9a",hair:"#1a1a1a",skin:"#6b4226",pants:"#2c3e50"},pos:{x:118,y:103},greeting:"Hi, I'm Crystal Hudson, a third-generation Brooklynite and one of the first out gay Black women ever elected in New York City. I represent District 35 - Crown Heights, Prospect Heights, Clinton Hill, and Fort Greene. I chair the Committee on General Welfare, which oversees HRA, DSS, and DHS. In my first term I passed more bills than any other first-term Brooklyn member. Welcome.",about:"Neighborhoods: Fort Greene, Clinton Hill, Prospect Heights, Crown Heights.",landmarks:"BAM, the country's oldest performing arts center. Prospect Park's meadows and woodlands. Fort Greene Park with its Prison Ship Martyrs Monument. Barclays Center on Atlantic Avenue. Grand Army Plaza's arch at the park entrance.",issues:"I authored the Black Agenda for New York City and co-authored the Marsha & Sylvia Plan, a first-of-its-kind policy agenda for LGBTQIA+ New Yorkers. As Chair of General Welfare, I'm accountable for how this city treats its poorest residents - homeless services, public assistance, charitable care. I pushed Age in Place NYC because our seniors shouldn't be priced out of the neighborhoods they built. Housing, youth, and dignity - that's the job.",cosponsored:229,email:"District35@council.nyc.gov",social:[["X", "@CMCrystalHudson", "https://x.com/CMCrystalHudson"], ["Instagram", "@CMCrystalHudson", "https://www.instagram.com/CMCrystalHudson/"]]},
    36: {name:"Chi Osse",district:"District 36",party:"Democrat",title:"Council Member",color:{shirt:"#00838f",hair:"#3d2b1f",skin:"#d4a574",pants:"#2c3e50"},pos:{x:126,y:101},greeting:"What's up, I'm Chi Osse. I was elected at 23 - the youngest ever on this Council and the only Gen-Z member - after organizing with the Black Lives Matter movement in 2020. I represent District 36: Bed-Stuy and North Crown Heights. I co-chair the Brooklyn Delegation and the LGBTQIA+ Caucus. Welcome to the district.",about:"Neighborhoods: Bedford-Stuyvesant (West and East), Crown Heights (North).",landmarks:"Bed-Stuy's historic brownstones, block after block. Herbert Von King Park, one of Brooklyn's oldest. Weeksville, a free Black community founded in 1838. Restoration Plaza on Fulton. The Fulton Street corridor, alive day and night.",issues:"I passed the FARE Act - Intro 360 - ending the exploitative practice of forcing tenants to pay broker fees they never asked for. I beat the landlord lobby to do it. I passed laws requiring anti-overdose medication in bars and nightlife venues, and a package to take on the rats. I believe in budget justice: municipal spending is power, and I'll keep using it to fight the housing crisis and reimagine public safety.",cosponsored:46,email:"District36@council.nyc.gov",social:[["X", "@CMChiOsse", "https://x.com/CMChiOsse"], ["Instagram", "@CMChiOsse", "https://www.instagram.com/CMChiOsse/"]]},
    37: {name:"Sandy Nurse",district:"District 37",party:"Democrat",title:"Council Member",color:{shirt:"#558b2f",hair:"#2c1810",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:143,y:101},greeting:"Hi, I'm Sandy Nurse. I was born in Panama to U.S. military parents and grew up on bases around the world - that's where I first saw poverty and inequality up close. Before the Council I worked for the UN World Food Programme, founded BK ROT, and co-founded Mayday Space right here in Bushwick. I chair the Committee on Civil and Human Rights. Welcome to District 37.",about:"Neighborhoods: Bushwick, Cypress Hills, East New York, Ocean Hill, Brownsville.",landmarks:"Highland Park up on the ridge. Cypress Hills, where Brooklyn meets Queens. The Evergreens Cemetery. Ocean Hill and Brownsville's NYCHA campuses, where I helped build urban farms with Green City Force. Knickerbocker Avenue in Bushwick.",issues:"I came up through movements for environmental and racial justice, and I run a committee that holds the city to account on civil rights. I care about tenant protections, fair wages, and building youth jobs that do real work - BK ROT was an environmental justice youth program before I ever ran for office. I previously chaired Criminal Justice, and I won't stop pushing for a city that invests in people, not cages.",cosponsored:86,email:"District37@council.nyc.gov",social:[["X", "@CMSandyNurse", "https://x.com/CMSandyNurse"], ["Instagram", "@CMSandyNurse", "https://www.instagram.com/CMSandyNurse/"]]},
    38: {name:"Alexa Aviles",district:"District 38",party:"Democrat",title:"Council Member",color:{shirt:"#d84315",hair:"#aaa",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:101,y:117},greeting:"Hi, I'm Alexa Aviles - a proud Boricua mom, Brooklynite, and democratic socialist serving my third term on the Council for District 38. Before politics I spent nearly three decades in nonprofits and social justice philanthropy. I represent Red Hook, Sunset Park, and parts of Gowanus, Park Slope, Borough Park, Dyker Heights, Bensonhurst, and Bath Beach. Welcome.",about:"Neighborhoods: Red Hook, Gowanus, Sunset Park, Bensonhurst, Bath Beach.",landmarks:"Red Hook's working waterfront, still a port town. Sunset Park with its skyline view over the harbor. Industry City on the Brooklyn Army Terminal shoreline. Green-Wood Cemetery's 478 acres. The Brooklyn Marine Terminal, whose future I'm fighting to shape.",issues:"I've passed over half a dozen bills taking on cruise ship pollution and truck congestion in Red Hook, and demanding transparency from NYCHA and on NYPD stops. I've fought the Mayor's cuts and clawed back millions for parks and school upgrades. Working-class South Brooklyn deserves a waterfront that serves residents, not just capital - that's why I keep pushing on the Brooklyn Marine Terminal, immigration, and budget justice.",cosponsored:51,email:"District38@council.nyc.gov",social:[["X", "@CMAlexaAviles", "https://x.com/CMAlexaAviles"], ["Instagram", "@alexaforcouncil", "https://www.instagram.com/alexaforcouncil/"]]},
    39: {name:"Shahana Hanif",district:"District 39",party:"Democrat",title:"Council Member",color:{shirt:"#6d4c41",hair:"#555",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:109,y:110},greeting:"Hi, I'm Shahana Hanif - the first Muslim woman and first Bangladeshi elected to the NYC Council, and the first woman to represent District 39. Born and raised here to Bangladeshi immigrant parents. I was diagnosed with Lupus at 17, and navigating that system is what sent me into public service. I chair the Committee on Disabilities. Welcome to District 39.",about:"Neighborhoods: Kensington, Borough Park, Park Slope, Gowanus, Carroll Gardens, Cobble Hill.",landmarks:"Prospect Park's 526 acres, the heart of the district. Carroll Gardens' row houses and front gardens. Park Slope's brownstone blocks. The Gowanus Canal, a Superfund site in the middle of reinvention. The Columbia Waterfront and Kensington's Little Bangladesh.",issues:"I ran Participatory Budgeting for former Council Member Brad Lander before I ever held office, and I still champion it as civic power for everyday New Yorkers. I led the resolution making May Lupus Awareness Month in NYC. I fight for immigrant rights, worker protections, and anti-discrimination laws that actually have teeth. A city built on care, equity, and safety - that's what I'm building, block by block.",cosponsored:251,email:"District39@council.nyc.gov",social:[["X", "@CMShahanaHanif", "https://x.com/CMShahanaHanif"], ["Instagram", "@shahanafrombk", "https://www.instagram.com/shahanafrombk/"]]},
    40: {name:"Rita Joseph",district:"District 40",party:"Democrat",title:"Council Member",color:{shirt:"#4e342e",hair:"#1a1a1a",skin:"#8d6e54",pants:"#2c3e50"},pos:{x:121,y:117},greeting:"Hi, I'm Rita Joseph. Before the Council I was a public school teacher at PS6, a community activist, and a proud union member. I immigrated from Haiti as a young person, and at 19 I organized a 150,000-person rally that forced the FDA to rescind its racist ban on Haitian blood donors. I chair the Committee on Higher Education. Welcome to District 40.",about:"Neighborhoods: Crown Heights (South), Prospect Lefferts Gardens, Flatbush, Ditmas Park, East Flatbush.",landmarks:"Prospect Park's southern edge, where the district begins. Flatbush Avenue, the commercial spine. Ditmas Park's wooden Victorians. Erasmus Hall, one of the oldest public high schools in America. Prospect Lefferts Gardens' landmark blocks.",issues:"I was a classroom teacher for years, so education isn't a talking point - it's my life. I fight for our kids, our immigrant families, and the teachers who keep this city running. I push for street safety because our children walk these blocks, and for housing because rent is eating our neighbors alive. I came up organizing against police brutality and transit cuts as a teen mom, and I still organize today.",cosponsored:66,email:"District40@council.nyc.gov",social:[["Instagram", "@ritajoseph40", "https://www.instagram.com/ritajoseph40/"]]},
    41: {name:"Darlene Mealy",district:"District 41",party:"Democrat",title:"Council Member",color:{shirt:"#bf360c",hair:"#3d2b1f",skin:"#6b4226",pants:"#2c3e50"},pos:{x:135,y:108},greeting:"Hi, I'm Darlene Mealy. I've served District 41 for more than a decade, fighting for working families, women, seniors, and young people across Bed-Stuy, Crown Heights, Brownsville, and East Flatbush. I chair the Subcommittee on Senior Centers and Food Security. I authored Local Laws 33 and 29 of 2015 to fight employment discrimination, and I helped pass the MWBE program this city still runs on. Welcome to District 41.",about:"Neighborhoods: Bed-Stuy (East), Crown Heights, Brownsville, Lefferts Gardens, East Flatbush.",landmarks:"Brownsville's historic blocks and mutual aid tradition. Crown Heights, where cultures share the same avenues. Lincoln Terrace Park on the ridge. The Fulton Street commercial stretch. Eastern Parkway, Olmsted's first parkway in America.",issues:"Equality, fairness, and non-discrimination in the workplace - those are my core fights. As former Chair of Contracts, I used the city's multi-billion-dollar procurement power to lift up Minority and Women-owned Businesses through Local Law 1 of 2013. I push anti-dumping laws because our blocks deserve respect, and work-site protections because our people deserve to come home safe. Senior food security is personal to me and non-negotiable.",cosponsored:4,email:"District41@council.nyc.gov",social:[["X", "@CMDarleneMealy", "https://x.com/CMDarleneMealy"], ["Instagram", "@CMDarleneMealy", "https://www.instagram.com/CMDarleneMealy/"]]},
    42: {name:"Chris Banks",district:"District 42",party:"Democrat",title:"Council Member",color:{shirt:"#1b5e20",hair:"#2c1810",skin:"#d4a574",pants:"#2c3e50"},pos:{x:151,y:117},greeting:"Hi, I'm Chris Banks - born and raised in East New York, the son of a Trinidadian mother and a hardworking father from Houston. I started out at the local Police Athletic League and ran after-school and summer programs for the East New York Local Development Corporation before the Council. Now I chair the Committee on Public Housing. Welcome to District 42.",about:"Neighborhoods: East New York, Spring Creek-Starrett City, Brownsville, Canarsie.",landmarks:"Starrett City, one of the largest federally subsidized housing developments in the country. Canarsie Pier out on Jamaica Bay. Spring Creek Park and the Gateway wetlands. The Linden Boulevard corridor. Brownsville's storied blocks.",issues:"As Chair of Public Housing, I fight for NYCHA residents every day - this district has some of the largest developments in the city, and they've been neglected for decades. I came up in grassroots youth work, so I keep pushing for youth programs that actually reach kids. Small businesses are the backbone of East New York and Canarsie, and I use every tool I have to help them open and stay open.",cosponsored:117,email:"District42@council.nyc.gov",social:[["X", "@Vote4ChrisBanks", "https://x.com/Vote4ChrisBanks"], ["Instagram", "@cmchrisbanks", "https://www.instagram.com/cmchrisbanks/"]]},
    43: {name:"Susan Zhuang",district:"District 43",party:"Democrat",title:"Council Member",color:{shirt:"#880e4f",hair:"#aaa",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:106,y:132},greeting:"Hi, I'm Susan Zhuang. I was born in Baipu, China, and came to the U.S. in 2008 as an international student chasing the American Dream. I earned my finance degree at SUNY Oswego and an MBA from the University of Southern Indiana. I served a decade as Chief of Staff to Assemblyman William Colton before my election. I chair the Committee on Aging. Welcome to District 43.",about:"Neighborhoods: Sunset Park, Dyker Heights, Bensonhurst, Bath Beach, Borough Park.",landmarks:"Dyker Heights' famous Christmas lights, a citywide tradition. Sunset Park's bluff with its harbor view. Bensonhurst's 18th Avenue, the heart of Brooklyn's Chinese and Italian communities. Bath Beach along the Belt. Gravesend's historic common.",issues:"Public safety comes first - our seniors and families deserve to feel safe on their blocks. I fight to protect SNAP and other lifelines for families who are barely making it, and I'm a relentless advocate for equitable education so our kids get real resources, not leftovers. As Chair of Aging, I push for senior services that respect our elders. Housing and small business support round out the work.",cosponsored:23,email:"District43@council.nyc.gov",social:[["X", "@susanzhuangnyc", "https://x.com/susanzhuangnyc"], ["Instagram", "@susanzhuangnyc", "https://www.instagram.com/susanzhuangnyc/"]]},
    44: {name:"Simcha Felder",district:"District 44",party:"Democrat",title:"Council Member",color:{shirt:"#4a148c",hair:"#555",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:112,y:130},greeting:"Hi, I'm Simcha Felder - a lifelong Brooklynite who grew up, married, and raised four kids in this neighborhood. I'm a CPA with an MBA from Baruch's Zicklin School and I've taught Management at Touro and Brooklyn College. Before the Council I served as Deputy Comptroller. First elected in 2002, I'm back fighting to make government actually work for you. Welcome to District 44.",about:"Neighborhoods: Borough Park, Flatbush, Gravesend, Mapleton, Midwood.",landmarks:"Borough Park's 13th Avenue, a commercial lifeline. Midwood's tree-lined blocks. Kings Highway, the retail spine. Flatbush's historic stretch. The new Hatzolah Volunteer Ambulance garage I helped make happen.",issues:"I cut red tape for a living. I passed the five-minute parking grace period, reformed unfair sanitation tickets, and ended the nuisance of unsolicited menus piling up on your stoop. I turned empty city-owned lots into housing, playgrounds, and community assets. I've secured millions to build parks, renovate schoolyards, and plant thousands of trees. Education, community services, and public safety are the daily work - responsive government is the mission.",cosponsored:0,email:"District44@council.nyc.gov",social:[]},
    45: {name:"Farah N. Louis",district:"District 45",party:"Democrat",title:"Council Member",color:{shirt:"#0d47a1",hair:"#1a1a1a",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:127,y:123},greeting:"Hi, I'm Farah N. Louis, the first Haitian and Bahamian American ever elected to the NYC Council. I'm the first woman to chair the Subcommittee on Zoning and Franchises - one of the most powerful seats in this building. I represent District 45: Flatbush, East Flatbush, Midwood, Flatlands, Kensington, Marine Park, and Canarsie. I've secured over $170 million in capital for this district. Welcome.",about:"Neighborhoods: Flatbush, East Flatbush, Midwood, Flatlands, Marine Park, Canarsie.",landmarks:"Flatbush Junction, where the trains and buses converge. Marine Park's 798 acres of salt marsh and fields. Kings Theatre, the restored 1929 movie palace. The new Shirley Chisholm Recreation Center, the first design-build project on city parkland. The East 25th Street Historic District - the first of its kind in East Flatbush.",issues:"I delivered the first women's health center on Flatbush Avenue and the first recreation center with a pool in Central Brooklyn. I fight for mental health because our communities are hurting quietly, and I push AI oversight because new technology can't mean old discrimination. Health equity, small business growth, and housing drive my agenda. I don't just talk about firsts - I build them.",cosponsored:94,email:"District45@council.nyc.gov",social:[["X", "@CMFarahLouis", "https://x.com/CMFarahLouis"], ["Instagram", "@CMFarahLouis", "https://www.instagram.com/CMFarahLouis/"]]},
    46: {name:"Mercedes Narcisse",district:"District 46",party:"Democrat",title:"Council Member",color:{shirt:"#01579b",hair:"#3d2b1f",skin:"#8d6e54",pants:"#2c3e50"},pos:{x:140,y:133},greeting:"Hi, I'm Mercedes Narcisse, a registered nurse representing District 46. I was born in Saint Marc, Haiti, migrated to Brooklyn as a teenager, attended public high school here, and graduated from CUNY. Before the Council I worked the bedside and ran a small business. I chair the Committee on Hospitals. My community office serves one of the largest constituencies in the city. Welcome.",about:"Neighborhoods: Bergen Beach, Canarsie, Flatlands, Gerritsen Beach, Marine Park, Mill Basin, Sheepshead Bay.",landmarks:"Sheepshead Bay's fishing fleet and boardwalk. Marine Park, Brooklyn's largest. Mill Basin's quiet waterways. Gerritsen Beach, a tight-knit bungalow community. Bergen Beach and the Jamaica Bay shoreline.",issues:"I'm a nurse, so healthcare isn't abstract to me - it's a patient with a bill they can't pay. As Chair of Hospitals, I fight for safe nurse-to-patient staffing ratios and for the public hospitals that serve our neighbors. I've secured millions to renovate parks, libraries, and schools, and to fund after-school programs and senior centers. Small business support, mental health access, and strong hospitals - that's the package.",cosponsored:53,email:"District46@council.nyc.gov",social:[["X", "@CMMercedesCD46", "https://x.com/CMMercedesCD46"], ["Instagram", "@mercedesnarcisse", "https://www.instagram.com/mercedesnarcisse/"]]},
    47: {name:"Kayla Santosuosso",district:"District 47",party:"Democrat",title:"Council Member",color:{shirt:"#e65100",hair:"#2c1810",skin:"#6b4226",pants:"#2c3e50"},pos:{x:100,y:137},greeting:"Hi, I'm Kayla Santosuosso, an attorney, former small business owner, and child of small business owners. I bussed tables at my parents' restaurant, ran a nonprofit for new immigrants, fought poverty through philanthropy in law school, and worked as a City attorney. I've called Bay Ridge home for over a decade - my husband and I owned a bar and restaurant here. Welcome to District 47.",about:"Neighborhoods: Bay Ridge, Coney Island, Sea Gate, Dyker Heights, Bath Beach, Gravesend.",landmarks:"Coney Island's boardwalk, Cyclone, and Wonder Wheel. Bay Ridge's 3rd and 5th Avenue commercial strips. Sea Gate, the private community at the island's western end. The Verrazzano-Narrows Bridge arcing over the harbor. Shore Road's waterfront promenade.",issues:"Quality of life is the whole job: clean sidewalks, safe streets, good schools, beautiful parks. But I also flex policy and budget muscle on the big problems - universal childcare so families can afford to stay here, and real small business support so our storefronts stay lit. I worked for former Council Member Justin Brannan, so I know this district block by block. Neighborhood preservation isn't a slogan - it's the work.",cosponsored:8,email:"District47@council.nyc.gov",social:[["X", "@kaymsanto", "https://x.com/kaymsanto"], ["Instagram", "@councilmemberkayla", "https://www.instagram.com/councilmemberkayla/"]]},
    48: {name:"Inna Vernikov",district:"District 48",party:"Republican",title:"Council Member",color:{shirt:"#b71c1c",hair:"#aaa",skin:"#d4a574",pants:"#2c3e50"},pos:{x:122,y:142},greeting:"Hi, I'm Inna Vernikov, a Ukrainian-born American lawyer serving as Minority Whip of the NYC Council. I flipped a seat that had been Democratic for over a hundred years and I'm one of six Republicans on this body. Before running, I owned an immigration and matrimonial law practice. I represent District 48 - Brighton Beach, Sheepshead Bay, Manhattan Beach, Midwood, and Coney Island-Sea Gate. Welcome.",about:"Neighborhoods: Coney Island-Sea Gate, Brighton Beach, Midwood, Sheepshead Bay-Manhattan Beach.",landmarks:"Brighton Beach boardwalk, Little Odessa by the sea. Sheepshead Bay's docks and seafood row. Manhattan Beach's quiet residential blocks. Coney Island-Sea Gate at the peninsula's end. Kingsborough Community College on the water.",issues:"Rising crime, unreasonable mandates, and the migrant crisis pushed me into this race, and I focus on common sense in city government. I've become a leading voice against antisemitism - bringing victims' stories to the national stage, holding an unprecedented Council hearing on CUNY antisemitism, and pushing to defund CUNY Law over it. Public safety, religious freedom, and standing up for our veterans and immigrants who came here the right way.",cosponsored:43,email:"District48@council.nyc.gov",social:[["X", "@InnaVernikov", "https://x.com/InnaVernikov"], ["Instagram", "@inna_vernikov", "https://www.instagram.com/inna_vernikov/"]]},
    49: {name:"Kamillah Hanks",district:"District 49",party:"Democrat",title:"Council Member",color:{shirt:"#33691e",hair:"#555",skin:"#e8c39e",pants:"#2c3e50"},pos:{x:56,y:126},greeting:"Hi, I'm Kamillah Hanks - lifelong Staten Islander, mother of four, and the first Staten Islander ever appointed Majority Whip of the New York City Council. I came up through marketing and finance at the College of Staten Island, founded the Historic Tappen Park Community Partnership, and started Staten Island's first YouthBuild. Welcome to District 49, the North Shore.",about:"Neighborhoods: St. George, Stapleton, Port Richmond, Snug Harbor, Todt Hill.",landmarks:"Snug Harbor Cultural Center, a 19th-century sailors' haven turned arts campus. St. George Ferry Terminal, the gateway to Manhattan. Fort Wadsworth under the Verrazzano. Historic Tappen Park in Stapleton. Todt Hill, the highest natural point on the Eastern Seaboard south of Maine. Port Richmond's working-class main street.",issues:"I fight for smart growth on the North Shore - not displacement. I helped secure $426 million with Mayor Adams for waterfront revitalization, delivered over $98 million for schools, parks, and health care, and stood up Staten Island's first Community Justice Center. I back small businesses, caregivers, and minority women entrepreneurs because that's who built this place. Historic preservation matters - so does making sure the people already here get to stay.",cosponsored:51,email:"District49@council.nyc.gov",social:[["X", "@KamillahMHanks", "https://x.com/KamillahMHanks"], ["Instagram", "@kamillahmhanks", "https://www.instagram.com/kamillahmhanks/"]]},
    50: {name:"David Carr",district:"District 50",party:"Republican",title:"Council Member",color:{shirt:"#263238",hair:"#1a1a1a",skin:"#f0d5b8",pants:"#2c3e50"},pos:{x:52,y:141},greeting:"Hey, I'm David Carr - Council Member for Mid-Island District 50. I've been hooked on government since age 10, started in constituent services for the U.S. House, then served eight years as Chief of Staff to Councilman Steve Matteo, where I helped pass 27 bills - a record for a Staten Island member. Welcome to the 50th.",about:"Neighborhoods: Arrochar, Bulls Head, Dongan Hills, Midland Beach, New Dorp, South Beach, Todt Hill.",landmarks:"Historic Richmond Town, a living colonial-era village. The Staten Island Museum. Susan Wagner High School's athletic fields. New Dorp High School. Midland Playground and Midland Beach boardwalk. The Staten Island Zoo's Clove Road entrance. South Beach along the Lower Bay.",issues:"I focus on quality of life and real financial relief for working homeowners. My first law waived DOB permit fees for families rebuilding after fires. My second cut brutal interest rates on property tax arrears - it covers 82 percent of NYC primary-resident homeowners. I led the fight to close the St. John Villa migrant shelter and oppose shelter expansion where neighborhoods can't absorb it. Fiscal transparency, fentanyl awareness, and veterans stay at the top of my list.",cosponsored:26,email:"District50@council.nyc.gov",social:[["X", "@CMDMCarr", "https://x.com/CMDMCarr"], ["Instagram", "@cmdmcarr", "https://www.instagram.com/cmdmcarr/"]]},
    51: {name:"Frank Morano",district:"District 51",party:"Republican",title:"Council Member",color:{shirt:"#37474f",hair:"#3d2b1f",skin:"#c69c6d",pants:"#2c3e50"},pos:{x:27,y:162},greeting:"I'm Frank Morano, and in 2025 I won three elections in a single year - an April special, a June primary, and the November general - to represent Staten Island's South Shore. Lifelong Staten Islander, NYU grad, decades in TV and radio covering government before I ran for it. I've served on Community Board 3 since 2013. Welcome to District 51.",about:"Neighborhoods: Great Kills, Eltingville, Annadale, Tottenville, Charleston, Freshkills Park.",landmarks:"Tottenville, the southernmost neighborhood in New York State. Conference House Park, where a 1776 peace conference nearly ended the Revolution. Freshkills Park, the former landfill being reborn as parkland three times the size of Central Park. Great Kills Harbor. Historic Richmondtown's edge. Annadale's Main Street village feel.",issues:"I ran on practical reforms - transparency, accountability, and making government actually respond. I pushed to restore in-person community board meetings, codify the official Staten Island borough flag, streamline rules strangling small businesses and mixed-use buildings, and expand fertility treatment tax credits for families. I work on safer roadway policies built for Staten Island's conditions, not Manhattan's. Veterans, charter reform, and stronger civic participation are the fights I keep showing up for.",cosponsored:144,email:"District51@council.nyc.gov",social:[["X", "@FrankMorano", "https://x.com/CMFrankMorano"], ["Instagram", "@councilmanfrankmorano", "https://www.instagram.com/councilmanfrankmorano"]]}

(function loadPhotos() {
    for (const [id, url] of Object.entries(PHOTO_URLS)) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { portraits[id] = img; };
        img.onerror = () => {
            // CORS failed - load without crossOrigin for HTML display
            const img2 = new Image();
            img2.onload = () => { portraits[id] = img2; portraits[id]._htmlOnly = true; };
            img2.src = url + (url.includes('?') ? '&' : '?') + '_cb=1';
        };
        img.src = url;
    }
})();

// PRE-RENDER MAP
// ═══════════════════════════
const mapCvs = document.createElement('canvas');
mapCvs.width = MAP_W * TILE; mapCvs.height = MAP_H * TILE;
const mctx = mapCvs.getContext('2d');
function hash(x,y){return((x*374761+y*668265+x*y*13)%1000)/1000;}

(function preRender() {
    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            const d = map[y][x], px = x*TILE, py = y*TILE, h = hash(x,y);
            if (d === 0) {
                mctx.fillStyle = h > 0.5 ? WATER : WATER2;
                mctx.fillRect(px,py,TILE,TILE);
                if (h > 0.85) { mctx.fillStyle='#1a4a6c'; mctx.fillRect(px+(h*20|0),py+(h*12|0),5,2); }
                continue;
            }
            if (d === 52) {
                mctx.fillStyle = h > 0.5 ? '#2d5a1e' : '#3a6e2a';
                mctx.fillRect(px,py,TILE,TILE);
                if (h > 0.55) {
                    mctx.fillStyle='#1a3a10'; mctx.fillRect(px+12,py+18,4,10);
                    mctx.fillStyle=h>0.75?'#2a7518':'#3a9528';
                    mctx.beginPath(); mctx.arc(px+14,py+14,9,0,Math.PI*2); mctx.fill();
                }
                if (x%3===0){mctx.fillStyle='#8a7a5a';mctx.fillRect(px+13,py,6,TILE);}
                continue;
            }
            if (d === 53) {
                // Bridge tile
                mctx.fillStyle='#4a4a4a';mctx.fillRect(px,py,TILE,TILE);
                mctx.fillStyle='#666';mctx.fillRect(px+2,py+12,TILE-4,8);
                mctx.fillStyle='#555';mctx.fillRect(px+6,py+4,3,TILE);mctx.fillRect(px+TILE-9,py+4,3,TILE);
                // Cables
                mctx.strokeStyle='#777';mctx.lineWidth=1;
                mctx.beginPath();mctx.moveTo(px+7,py);mctx.lineTo(px+TILE/2,py+10);mctx.lineTo(px+TILE-8,py);mctx.stroke();
                continue;
            }
            if (d === 54) {
                // Ferry dock tile
                mctx.fillStyle='#8B7355';mctx.fillRect(px,py,TILE,TILE);
                mctx.fillStyle='#a08860';mctx.fillRect(px+2,py+4,TILE-4,4);mctx.fillRect(px+2,py+14,TILE-4,4);mctx.fillRect(px+2,py+24,TILE-4,4);
                continue;
            }
            mctx.fillStyle = DISTRICT_COLORS[d]; mctx.fillRect(px,py,TILE,TILE);
            if(h>0.4&&h<0.45){mctx.fillStyle='rgba(255,255,255,0.04)';mctx.fillRect(px,py,TILE,TILE);}
            const isStH=y%4===0, isStV=x%5===0;
            if(isStH||isStV){
                mctx.fillStyle=DISTRICT_LIGHT[d]; mctx.globalAlpha=0.35;
                if(isStH) mctx.fillRect(px,py+13,TILE,5);
                if(isStV) mctx.fillRect(px+13,py,5,TILE);
                mctx.globalAlpha=1;
            }
            if(!isStH&&!isStV&&h>0.62){
                const bw=14+(h*14|0),bh=18+(h*10|0),bx=px+(TILE-bw)/2,by=py+(TILE-bh)/2;
                mctx.fillStyle='rgba(0,0,0,0.3)'; mctx.fillRect(bx,by,bw,bh);
                mctx.fillStyle='rgba(255,255,200,0.25)';
                for(let wy=0;wy<3;wy++) for(let wx=0;wx<2;wx++)
                    mctx.fillRect(bx+3+wx*(bw/2-2),by+3+wy*(bh/3-1),3,3);
            }
            if(!isStH&&!isStV&&h<0.12){
                mctx.fillStyle='#1a4a12';mctx.fillRect(px+14,py+20,4,8);
                mctx.fillStyle='#3a8528';mctx.beginPath();mctx.arc(px+16,py+16,7,0,Math.PI*2);mctx.fill();
            }
            if(d>=1&&d<=10){
                const diff=(dx,dy)=>{const nx=x+dx,ny=y+dy;if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H)return true;const nd=map[ny][nx];return nd!==d&&nd!==0;};
                mctx.fillStyle='rgba(255,255,255,0.2)';
                if(diff(-1,0))mctx.fillRect(px,py,2,TILE);
                if(diff(1,0))mctx.fillRect(px+TILE-2,py,2,TILE);
                if(diff(0,-1))mctx.fillRect(px,py,TILE,2);
                if(diff(0,1))mctx.fillRect(px,py+TILE-2,TILE,2);
            }
        }
    }
})();

const keys = {};
document.addEventListener('keydown', e => {
    if(searchOpen) return; // address search is active, don't handle game keys
    keys[e.key] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Tab','Backspace'].includes(e.key)) e.preventDefault();
    if(state==='title'&&(e.key==='Enter'||e.key===' ')){state='playing';return;}
    if(state==='instructions'&&(e.key==='Escape'||e.key==='Enter'||e.key===' ')){state='playing';return;}
    if(state==='playing'&&e.key==='Escape'){state='instructions';return;}
    if(state==='playing'&&(e.key===' '||e.key==='Enter')&&nearNPC){
        if(nearNPC==='sq') startSquirrelDialogue();
        else if(typeof nearNPC==='string'&&nearNPC.startsWith('ferry_')) startFerryDialogue(parseInt(nearNPC.split('_')[1]));
        else startDialogue(nearNPC);
        return;
    }
    if(state==='dialogue') handleDlgInput(e.key);
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Zoom controls
const zoomLevelEl = document.getElementById('zoom-level');
function updateZoom(newZoom) {
    zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(newZoom * 10) / 10));
    zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
}
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    updateZoom(zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, {passive: false});
document.getElementById('zoom-in').addEventListener('click', () => updateZoom(zoom + ZOOM_STEP));
document.getElementById('zoom-out').addEventListener('click', () => updateZoom(zoom - ZOOM_STEP));
document.getElementById('zoom-reset').addEventListener('click', () => updateZoom(1.0));
document.addEventListener('keydown', e => {
    if(searchOpen || state === 'dialogue') return;
    if(e.key === '=' || e.key === '+') { updateZoom(zoom + ZOOM_STEP); e.preventDefault(); }
    if(e.key === '-' || e.key === '_') { updateZoom(zoom - ZOOM_STEP); e.preventDefault(); }
    if(e.key === '0') { updateZoom(1.0); e.preventDefault(); }
}, true);

function drawSprite(sx,sy,dir,frame,colors,npcId) {
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(sx+6,sy+27,20,5);
    ctx.fillStyle=colors.pants;
    const lo=frame?3:0;
    ctx.fillRect(sx+8-lo,sy+22,6,7); ctx.fillRect(sx+18+lo,sy+22,6,7);
    ctx.fillStyle=colors.shirt; ctx.fillRect(sx+5,sy+12,22,11);
    ctx.fillStyle=colors.skin;
    const ao=frame?1:0;
    if(dir===1){ctx.fillRect(sx+1,sy+13+ao,5,8);ctx.fillRect(sx+24,sy+13-ao,5,8);}
    else if(dir===2){ctx.fillRect(sx+3,sy+13-ao,5,8);ctx.fillRect(sx+26,sy+13+ao,5,8);}
    else{ctx.fillRect(sx+1,sy+13,5,8);ctx.fillRect(sx+26,sy+13,5,8);}
    ctx.fillStyle=colors.skin; ctx.fillRect(sx+7,sy+2,18,11);
    ctx.fillStyle=colors.hair;
    if(dir===3){ctx.fillRect(sx+7,sy,18,9);}
    else{ctx.fillRect(sx+7,sy,18,5);if(dir===1)ctx.fillRect(sx+7,sy,4,8);if(dir===2)ctx.fillRect(sx+21,sy,4,8);}
    if(dir!==3){
        ctx.fillStyle='#fff';ctx.fillRect(sx+10,sy+5,4,4);ctx.fillRect(sx+18,sy+5,4,4);
        ctx.fillStyle='#111';const ex=dir===1?0:dir===2?2:1;
        ctx.fillRect(sx+10+ex,sy+6,2,2);ctx.fillRect(sx+18+ex,sy+6,2,2);
    }
    if(npcId!=null){
        const bob=Math.sin(Date.now()/300)*3;ctx.textAlign='center';
        if(!visitedMembers.has(npcId)){ctx.fillStyle='#ffff00';ctx.font='bold 20px monospace';ctx.fillText('!',sx+16,sy-6+bob);}
        else{ctx.fillStyle='#44ff44';ctx.font='bold 16px monospace';ctx.fillText('\u2713',sx+16,sy-4+bob);}
        ctx.textAlign='left';
    }
}

function drawSquirrel(sx, sy) {
    const bob = Math.sin(Date.now()/200)*2;
    // Body
    ctx.fillStyle='#8B6914';
    ctx.fillRect(sx+8,sy+14+bob,16,10);
    // Head
    ctx.fillStyle='#A07818';
    ctx.fillRect(sx+10,sy+8+bob,12,8);
    // Ears
    ctx.fillStyle='#8B6914';
    ctx.fillRect(sx+10,sy+5+bob,3,4);
    ctx.fillRect(sx+19,sy+5+bob,3,4);
    // Eyes
    ctx.fillStyle='#000';
    ctx.fillRect(sx+12,sy+10+bob,2,2);
    ctx.fillRect(sx+18,sy+10+bob,2,2);
    // Nose
    ctx.fillStyle='#5a3a08';
    ctx.fillRect(sx+15,sy+13+bob,2,2);
    // Tail (bushy!)
    ctx.fillStyle='#A07818';
    ctx.beginPath();
    ctx.ellipse(sx+6, sy+10+bob, 5, 8, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#C89428';
    ctx.beginPath();
    ctx.ellipse(sx+6, sy+8+bob, 3, 5, -0.3, 0, Math.PI*2);
    ctx.fill();
    // Paws
    ctx.fillStyle='#A07818';
    ctx.fillRect(sx+10,sy+24+bob,4,3);
    ctx.fillRect(sx+18,sy+24+bob,4,3);
    // Exclamation mark
    const bob2 = Math.sin(Date.now()/400)*3;
    ctx.fillStyle='#ffff00';ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillText('!',sx+16,sy+bob2);
    ctx.textAlign='left';
}
