<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#2C2418"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" fill="#FDFBF7" rx="4"/>
  <!-- Hero image area -->
  <rect x="6" y="6" width="188" height="48" rx="3" fill="#DDD5C8"/>
  <rect x="6" y="6" width="188" height="48" rx="3" fill="url(#heroGrad)" opacity="0.5"/>
  <!-- Faux painting in hero (golden frame) -->
  <rect x="76" y="12" width="48" height="36" rx="1" fill="#C8B898" opacity="0.5"/>
  <rect x="78" y="14" width="44" height="32" rx="1" fill="#A89878" opacity="0.4"/>
  <!-- Hero text -->
  <rect x="12" y="38" width="50" height="5" rx="1" fill="rgba(255,255,255,0.85)"/>
  <rect x="12" y="46" width="32" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Star on hero -->
  <text x="180" y="19" fill="#D4A017" font-size="10" text-anchor="middle">&#9733;</text>
  <!-- Search bar -->
  <rect x="6" y="60" width="110" height="9" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="6" y="60" width="2" height="9" rx="1" fill="transparent"/>
  <text x="12" y="67" fill="#A09888" font-size="5" font-family="sans-serif">Search artworks...</text>
  <rect x="118" y="60" width="24" height="9" rx="3" fill="url(#goldShine)"/>
  <text x="124" y="67" fill="#fff" font-size="5" font-family="sans-serif" font-weight="600">Search</text>
  <!-- Department chips -->
  <rect x="6" y="74" width="18" height="7" rx="3.5" fill="#B8860B"/>
  <text x="10" y="79.5" fill="#fff" font-size="4" font-family="sans-serif" font-weight="600">All</text>
  <rect x="27" y="74" width="36" height="7" rx="3.5" fill="#fff" stroke="#E8E0D4" stroke-width="0.4"/>
  <rect x="66" y="74" width="28" height="7" rx="3.5" fill="#fff" stroke="#E8E0D4" stroke-width="0.4"/>
  <rect x="97" y="74" width="42" height="7" rx="3.5" fill="#fff" stroke="#E8E0D4" stroke-width="0.4"/>
  <rect x="142" y="74" width="24" height="7" rx="3.5" fill="#fff" stroke="#E8E0D4" stroke-width="0.4"/>
  <!-- Gallery cards — 4 columns with image area -->
  <!-- Card 1 -->
  <rect x="6" y="86" width="44" height="48" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="6" y="86" width="44" height="32" rx="3" fill="#E8DFD2"/>
  <rect x="10" y="122" width="28" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="10" y="127" width="18" height="2" rx="1" fill="#6B5E50" opacity="0.25"/>
  <!-- Star -->
  <text x="42" y="95" fill="#D4A017" font-size="7" text-anchor="middle" opacity="0.7">&#9733;</text>
  <!-- Card 2 -->
  <rect x="54" y="86" width="44" height="48" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="54" y="86" width="44" height="32" rx="3" fill="#DDD5C8"/>
  <rect x="58" y="122" width="32" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="58" y="127" width="22" height="2" rx="1" fill="#6B5E50" opacity="0.25"/>
  <!-- Card 3 -->
  <rect x="102" y="86" width="44" height="48" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="102" y="86" width="44" height="32" rx="3" fill="#E2D9CC"/>
  <rect x="106" y="122" width="26" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="106" y="127" width="20" height="2" rx="1" fill="#6B5E50" opacity="0.25"/>
  <!-- Card 4 -->
  <rect x="150" y="86" width="44" height="48" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="150" y="86" width="44" height="32" rx="3" fill="#D8CFBF"/>
  <rect x="154" y="122" width="30" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="154" y="127" width="16" height="2" rx="1" fill="#6B5E50" opacity="0.25"/>
  <!-- FAB hint -->
  <circle cx="186" cy="130" r="6" fill="url(#goldShine)" opacity="0.6"/>
  <text x="186" y="133" fill="#fff" font-size="7" text-anchor="middle">&#9733;</text>
</svg>
