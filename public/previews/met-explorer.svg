<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#FDFBF7" rx="4"/>
  <!-- Hero image area -->
  <rect x="8" y="8" width="184" height="52" rx="3" fill="#EDE8DF"/>
  <rect x="8" y="8" width="184" height="52" rx="3" fill="url(#heroGrad)" opacity="0.6"/>
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#2C2418"/>
    </linearGradient>
  </defs>
  <!-- Hero text lines -->
  <rect x="14" y="44" width="60" height="5" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="14" y="52" width="40" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Department chips -->
  <rect x="8" y="66" width="28" height="8" rx="4" fill="#B8860B"/>
  <rect x="40" y="66" width="32" height="8" rx="4" fill="#EDE8DF"/>
  <rect x="76" y="66" width="24" height="8" rx="4" fill="#EDE8DF"/>
  <rect x="104" y="66" width="30" height="8" rx="4" fill="#EDE8DF"/>
  <!-- Gallery cards - 4 columns -->
  <rect x="8" y="80" width="42" height="52" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="8" y="80" width="42" height="36" rx="3" fill="#EDE8DF"/>
  <rect x="12" y="120" width="30" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="12" y="126" width="20" height="2" rx="1" fill="#6B5E50" opacity="0.3"/>

  <rect x="54" y="80" width="42" height="52" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="54" y="80" width="42" height="36" rx="3" fill="#EDE8DF"/>
  <rect x="58" y="120" width="28" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="58" y="126" width="22" height="2" rx="1" fill="#6B5E50" opacity="0.3"/>

  <rect x="100" y="80" width="42" height="52" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="100" y="80" width="42" height="36" rx="3" fill="#EDE8DF"/>
  <rect x="104" y="120" width="32" height="3" rx="1" fill="#2C2418" opacity="0.3"/>
  <rect x="104" y="126" width="18" height="2" rx="1" fill="#6B5E50" opacity="0.3"/>

  <rect x="146" y="80" width="42" height="52" rx="3" fill="#fff" stroke="#E8E0D4" stroke-width="0.5"/>
  <rect x="146" y="80" width="42" height="36" rx="3" fill="#EDE8DF"/>
