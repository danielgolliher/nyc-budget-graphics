<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" rx="4" fill="#faf8f4"/>
  <!-- Title -->
  <text x="15" y="16" fill="#2c1810" font-size="8" font-family="Georgia, serif" font-weight="600">Admission of States</text>
  <text x="190" y="16" fill="#887" font-size="6" font-family="sans-serif" text-anchor="end">1787–1959</text>
  <!-- Header bar -->
  <rect x="10" y="22" width="180" height="10" rx="2" fill="#2c1810"/>
  <text x="18" y="29.5" fill="#f5f0e8" font-size="5.5" font-family="Georgia, serif"># State Admitted Act</text>
  <line x1="10" y1="32" x2="190" y2="32" stroke="#8b2500" stroke-width="1.5"/>
  <!-- Rows with category badges -->
  <!-- Row 1 — Original 13 -->
  <rect x="10" y="34" width="180" height="11" fill="#faf8f4"/>
  <text x="18" y="42" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">1</text>
  <text x="30" y="42" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">Delaware</text>
  <text x="72" y="42" fill="#665" font-size="5.5" font-family="sans-serif">Dec. 7, 1787</text>
  <rect x="120" y="37" width="30" height="7" rx="2" fill="#ccd5e0"/>
  <text x="135" y="42.5" fill="#1e2d4a" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">ORIGINAL</text>
  <!-- Row 2 -->
  <rect x="10" y="46" width="180" height="11" fill="#f0ebe2"/>
  <text x="18" y="54" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">2</text>
  <text x="30" y="54" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">Pennsylvania</text>
  <text x="82" y="54" fill="#665" font-size="5.5" font-family="sans-serif">Dec. 12, 1787</text>
  <rect x="140" y="49" width="30" height="7" rx="2" fill="#ccd5e0"/>
  <text x="155" y="54.5" fill="#1e2d4a" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">ORIGINAL</text>
  <!-- Row 3 -->
  <rect x="10" y="58" width="180" height="11" fill="#faf8f4"/>
  <text x="18" y="66" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">14</text>
  <text x="30" y="66" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">Vermont</text>
  <text x="68" y="66" fill="#665" font-size="5.5" font-family="sans-serif">Mar. 4, 1791</text>
  <rect x="118" y="61" width="32" height="7" rx="2" fill="#e8d4d0"/>
  <text x="134" y="66.5" fill="#6b2a1e" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">REPUBLIC</text>
  <!-- Row 4 -->
  <rect x="10" y="70" width="180" height="11" fill="#f0ebe2"/>
  <text x="18" y="78" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">28</text>
  <text x="30" y="78" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">Texas</text>
  <text x="60" y="78" fill="#665" font-size="5.5" font-family="sans-serif">Dec. 29, 1845</text>
  <rect x="118" y="73" width="32" height="7" rx="2" fill="#e8d4d0"/>
  <text x="134" y="78.5" fill="#6b2a1e" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">REPUBLIC</text>
  <!-- Row 5 -->
  <rect x="10" y="82" width="180" height="11" fill="#faf8f4"/>
  <text x="18" y="90" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">35</text>
  <text x="30" y="90" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">West Virginia</text>
  <text x="82" y="90" fill="#665" font-size="5.5" font-family="sans-serif">June 20, 1863</text>
  <rect x="134" y="85" width="30" height="7" rx="2" fill="#e8d0d0"/>
  <text x="149" y="90.5" fill="#6b1e1e" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">WARTIME</text>
  <!-- Row 6 -->
  <rect x="10" y="94" width="180" height="11" fill="#f0ebe2"/>
  <text x="18" y="102" fill="#8b2500" font-size="6" font-family="Georgia, serif" font-weight="600">50</text>
  <text x="30" y="102" fill="#1a1a1a" font-size="6" font-family="sans-serif" font-weight="600">Hawaii</text>
  <text x="63" y="102" fill="#665" font-size="5.5" font-family="sans-serif">Aug. 21, 1959</text>
  <rect x="118" y="97" width="34" height="7" rx="2" fill="#d4e8d0"/>
  <text x="135" y="102.5" fill="#2a5a20" font-size="4.5" font-family="sans-serif" font-weight="700" text-anchor="middle">TERRITORY</text>
  <!-- Fade rows -->
  <rect x="10" y="107" width="180" height="6" fill="#faf8f4" opacity="0.6"/>
  <rect x="10" y="114" width="180" height="6" fill="#f0ebe2" opacity="0.3"/>
  <!-- Filter pills at bottom -->
  <rect x="14" y="124" width="28" height="9" rx="4" fill="#fff" stroke="#c4b9a8" stroke-width="0.5"/>
  <text x="28" y="130.5" fill="#665" font-size="5" font-family="sans-serif" text-anchor="middle">Search</text>
  <rect x="46" y="124" width="20" height="9" rx="4" fill="#2c1810"/>
  <text x="56" y="130.5" fill="#f5f0e8" font-size="5" font-family="sans-serif" text-anchor="middle">Era</text>
  <rect x="70" y="124" width="34" height="9" rx="4" fill="#fff" stroke="#c4b9a8" stroke-width="0.5"/>
  <text x="87" y="130.5" fill="#665" font-size="5" font-family="sans-serif" text-anchor="middle">Category</text>
  <text x="186" y="131" fill="#887" font-size="5" font-family="sans-serif" text-anchor="end">50 states</text>
</svg>
