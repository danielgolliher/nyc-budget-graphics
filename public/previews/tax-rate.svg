<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" rx="4" fill="#fff"/>
  <rect width="200" height="3" fill="#14237e"/>
  <!-- Title -->
  <text x="14" y="18" fill="#0b1240" font-size="7.5" font-family="Georgia, serif">NYS–NYC Tax Rate</text>
  <text x="186" y="18" fill="#9aa2be" font-size="5.5" font-family="sans-serif" text-anchor="end">1966–2025</text>
  <!-- Grid lines -->
  <line x1="24" y1="30" x2="178" y2="30" stroke="rgba(0,0,0,0.05)" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="24" y1="52" x2="178" y2="52" stroke="rgba(0,0,0,0.05)" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="24" y1="74" x2="178" y2="74" stroke="rgba(0,0,0,0.05)" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="24" y1="96" x2="178" y2="96" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <!-- Federal rate bars (simplified, showing the decline) -->
  <g opacity="0.55">
    <!-- 1966-1976: 70% -->
    <rect x="26" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="30" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="34" y="28" width="2" height="68" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="38" y="27" width="2" height="69" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="42" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="46" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="50" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="54" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="58" y="30" width="2" height="66" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="62" y="31" width="2" height="65" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <!-- 1978-1986: 50% then 38.5, 28 -->
    <rect x="66" y="44" width="2" height="52" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="70" y="44" width="2" height="52" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="74" y="44" width="2" height="52" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="78" y="44" width="2" height="52" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="82" y="44" width="2" height="52" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="86" y="53" width="2" height="43" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="90" y="65" width="2" height="31" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="94" y="65" width="2" height="31" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <!-- 1989-2000: ~39.6% -->
    <rect x="98" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="102" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="106" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="110" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="114" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <!-- 2003-2012: 35% -->
    <rect x="118" y="60" width="2" height="36" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="122" y="60" width="2" height="36" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="126" y="60" width="2" height="36" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="130" y="60" width="2" height="36" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="134" y="60" width="2" height="36" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <!-- 2013-2017: 39.6% -->
    <rect x="138" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="142" y="56" width="2" height="40" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <!-- 2018-2025: 37% -->
    <rect x="146" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="150" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="154" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="158" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="162" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="166" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="170" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
    <rect x="174" y="58" width="2" height="38" rx="0.5" fill="rgba(155,175,230,0.6)"/>
  </g>
  <!-- NY+City line (simplified) -->
  <polyline
    points="26,82 34,82 42,82 50,82 58,82 62,78 66,80 70,80 78,80 86,74 90,73 94,72 98,68 102,67 106,68 110,76 114,78 118,78 126,74 130,78 134,78 138,70 142,70 146,72 150,72 154,50 158,50 162,42 166,42 174,42"
    fill="none" stroke="#14237e" stroke-width="2" stroke-linejoin="round"
  />
  <!-- Area under line -->
  <polygon
    points="26,82 34,82 42,82 50,82 58,82 62,78 66,80 70,80 78,80 86,74 90,73 94,72 98,68 102,67 106,68 110,76 114,78 118,78 126,74 130,78 134,78 138,70 142,70 146,72 150,72 154,50 158,50 162,42 166,42 174,42 174,96 26,96"
    fill="rgba(20,35,126,0.06)"
  />
  <!-- Legend -->
  <rect x="14" y="106" width="10" height="7" rx="1.5" fill="rgba(155,175,230,0.6)"/>
  <text x="28" y="112" fill="#9aa2be" font-size="5" font-family="sans-serif">Federal</text>
  <line x1="58" y1="109.5" x2="72" y2="109.5" stroke="#14237e" stroke-width="1.5"/>
  <text x="76" y="112" fill="#9aa2be" font-size="5" font-family="sans-serif">NY+NYC</text>
  <!-- Year labels -->
  <text x="26" y="105" fill="#9aa2be" font-size="5" font-family="sans-serif">1966</text>
  <text x="174" y="105" fill="#9aa2be" font-size="5" font-family="sans-serif" text-anchor="end">2025</text>
  <!-- Source -->
  <text x="100" y="132" fill="#b8bdd4" font-size="4.5" font-family="sans-serif" text-anchor="middle">Manhattan Institute</text>
</svg>
