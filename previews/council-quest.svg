<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102840"/>
      <stop offset="100%" stop-color="#0e2235"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="140" fill="url(#sky)"/>

  <!-- Water -->
  <rect x="0" y="30" width="200" height="95" fill="url(#water)" opacity="0.6"/>

  <!-- Manhattan island shape -->
  <path d="M88,28 L95,22 L102,20 L108,22 L112,28 L114,40 L116,55 L118,70 L116,82 L114,92 L110,102 L106,110 L100,116 L96,118 L92,114 L88,104 L86,92 L84,78 L83,65 L84,50 L85,38 Z" fill="#c0392b" opacity="0.7"/>

  <!-- District boundaries -->
  <line x1="86" y1="55" x2="116" y2="55" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="85" y1="72" x2="117" y2="72" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="86" y1="90" x2="114" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="100" y1="22" x2="100" y2="118" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

  <!-- Central Park -->
  <rect x="96" y="40" width="8" height="20" rx="2" fill="#2d5a1e" opacity="0.8"/>

  <!-- Brooklyn (grayed) -->
  <path d="M120,80 L140,76 L150,82 L155,95 L148,108 L135,115 L120,112 L115,100 Z" fill="#2a2a2a" opacity="0.5"/>

  <!-- Queens (grayed) -->
  <path d="M125,40 L155,35 L170,45 L175,65 L165,78 L145,76 L120,75 Z" fill="#2a2a2a" opacity="0.5"/>

  <!-- Player character -->
  <rect x="97" y="78" width="6" height="4" fill="#d4a574" rx="1"/>
  <rect x="96" y="82" width="8" height="8" fill="#3366cc" rx="1"/>
  <rect x="97" y="90" width="3" height="4" fill="#2c3e50"/>
  <rect x="101" y="90" width="3" height="4" fill="#2c3e50"/>

  <!-- NPC with ! marker -->
  <rect x="107" y="60" width="6" height="4" fill="#d4a574" rx="1"/>
  <rect x="106" y="64" width="8" height="8" fill="#d35400" rx="1"/>
  <circle cx="110" cy="56" r="4" fill="#ffff00" opacity="0.9"/>
  <text x="110" y="59" font-size="6" fill="#000" text-anchor="middle" font-weight="bold">!</text>

  <!-- NPC 2 -->
  <rect x="89" y="96" width="6" height="4" fill="#d4a574" rx="1"/>
  <rect x="88" y="100" width="8" height="8" fill="#c0392b" rx="1"/>
  <circle cx="92" cy="92" r="4" fill="#ffff00" opacity="0.9"/>
  <text x="92" y="95" font-size="6" fill="#000" text-anchor="middle" font-weight="bold">!</text>

  <!-- Squirrel in park -->
  <ellipse cx="99" cy="48" rx="2" ry="3" fill="#8B6914"/>
  <circle cx="99" cy="45" r="1.5" fill="#A07818"/>

  <!-- Dialogue box at bottom -->
  <rect x="10" y="122" width="180" height="14" rx="2" fill="rgba(8,8,24,0.9)" stroke="#2980b9" stroke-width="0.8"/>
  <text x="18" y="132" font-family="monospace" font-size="5" fill="#eee">Welcome to District 7! I'm Shaun Abreu...</text>

  <!-- HUD elements -->
  <rect x="5" y="4" width="50" height="12" rx="1" fill="rgba(0,0,0,0.6)"/>
  <text x="8" y="12" font-family="monospace" font-size="4" fill="#fff">District 7</text>

  <rect x="145" y="4" width="50" height="12" rx="1" fill="rgba(0,0,0,0.6)"/>
  <text x="148" y="12" font-family="monospace" font-size="4" fill="#fff">Met: 3/10</text>

  <!-- Title -->
  <text x="100" y="138" font-family="monospace" font-size="6.5" fill="#ffd700" text-anchor="middle" font-weight="bold">NYC COUNCIL QUEST</text>
</svg>
